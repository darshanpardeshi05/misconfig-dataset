AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - IAM user without MFA (Multi-Factor Authentication) enabled

Metadata:
  Misconfiguration:
    Id: "MISCONFIG-018"
    Batch: "Batch-4"
    Category: "IAM & Access Over-Permission"
    Severity: "HIGH"
    RuleId: "IAM-008"
    Service: "IAM"
    ResourceType: "AWS::IAM::User"
    Description: "IAM user does not have MFA enabled"
    Impact: "User account can be compromised via phishing or password theft without second authentication factor"
    Remediation: "Enable MFA for the IAM user using Virtual MFA device"

    Keywords:
      - "MFADevice"
      - "VirtualMFADevice"
      - "User without MFA"
      - "LoginProfile"
      - "aws:MultiFactorAuthPresent"

    ML_Label: "misconfiguration"

Resources:

  NoMFAUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub "no-mfa-user-${AWS::StackName}"
      LoginProfile:
        Password: "TempPassword123!"
        PasswordResetRequired: true
      Tags:
        - Key: Name
          Value: "No-MFA-User"
        - Key: Misconfiguration
          Value: "IAM-User-Without-MFA"
        - Key: MisconfigId
          Value: "MISCONFIG-018"
        - Key: Batch
          Value: "Batch-4"
        - Key: Category
          Value: "IAM-OverPermission"
        - Key: Severity
          Value: "HIGH"
        - Key: ToolDetection
          Value: "Prowler,ScoutSuite,Custodian"

  NoMFAUserAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref NoMFAUser

Outputs:
  Username:
    Description: "IAM user without MFA enabled"
    Value: !Ref NoMFAUser

  MisconfigId:
    Description: "Unique Misconfiguration ID"
    Value: "MISCONFIG-018"

  Risk:
    Description: "Security Risk"
    Value: "User can authenticate without MFA"

  CheckCommand:
    Description: "Check MFA status"
    Value: !Sub "aws iam list-mfa-devices --user-name ${NoMFAUser}"

  Remediation:
    Description: "Enable MFA for this user"
    Value: "Attach Virtual MFA device via AWS Console or CLI"
