AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - IAM policy with BOTH Action "*" and Resource "*" (Full Admin Access)

Metadata:
  Misconfiguration:
    Category: "IAM-OverPermission"
    Severity: "CRITICAL"
    RuleId: "IAM-003"
    Description: "IAM policy grants full administrative access using Action '*' and Resource '*'"
    Remediation: "Remove policy and enforce least-privilege access"
    Keywords:
      - "Action * Resource *"
      - "full admin policy"
      - "iam full access"
      - "over permissive iam"
      - "administrator equivalent"
    ML_Label: "misconfiguration"

Resources:

  FullAdminUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub "full-admin-user-${AWS::StackName}"
      Tags:
        - Key: Name
          Value: "Full-Admin-User"
        - Key: Misconfiguration
          Value: "IAM-003"
        - Key: Category
          Value: "IAM-OverPermission"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-2"

  WildcardBothPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "WildcardBothPolicy-${AWS::StackName}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"

            # MISCONFIGURATION: Full admin access
            Action: "*"
            Resource: "*"

      Users:
        - !Ref FullAdminUser

  UserAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref FullAdminUser

Outputs:
  Username:
    Description: "IAM user with full administrative access"
    Value: !Ref FullAdminUser

  AccessKeyId:
    Description: "Access Key ID"
    Value: !Ref UserAccessKey

  SecretAccessKey:
    Description: "Secret Access Key"
    Value: !GetAtt UserAccessKey.SecretAccessKey

  Risk:
    Description: "Security Risk"
    Value: "User has complete control over all AWS resources."

  FixCommand:
    Description: "Remediation Command"
    Value: !Sub "aws iam delete-user-policy --user-name ${FullAdminUser} --policy-name WildcardBothPolicy-${AWS::StackName}"
