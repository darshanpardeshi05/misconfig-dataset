AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - IAM role with AdministratorAccess managed policy

Metadata:
  Misconfiguration:
    Category: "IAM-OverPermission"
    Severity: "CRITICAL"
    RuleId: "IAM-004"
    Description: "IAM role has AdministratorAccess managed policy attached, granting full admin permissions"
    Remediation: "Detach AdministratorAccess and apply least-privilege policies"
    Keywords:
      - "AdministratorAccess"
      - "iam admin role"
      - "managed policy admin"
      - "full access role"
      - "iam role over permissive"
    ML_Label: "misconfiguration"

Resources:

  AdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "admin-role-${AWS::StackName}"

      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service: "ec2.amazonaws.com"
            Action: "sts:AssumeRole"

      # MISCONFIGURATION: Full admin managed policy
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AdministratorAccess"

      Tags:
        - Key: Name
          Value: "Admin-Role"
        - Key: Misconfiguration
          Value: "IAM-004"
        - Key: Category
          Value: "IAM-OverPermission"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-2"

  AdminInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "admin-profile-${AWS::StackName}"
      Roles:
        - !Ref AdminRole

Outputs:
  RoleName:
    Description: "IAM role with admin access"
    Value: !Ref AdminRole

  RoleArn:
    Description: "Role ARN"
    Value: !GetAtt AdminRole.Arn

  Risk:
    Description: "Security Risk"
    Value: "Any entity assuming this role gets full administrative control."

  FixCommand:
    Description: "Detach admin policy"
    Value: !Sub "aws iam detach-role-policy --role-name ${AdminRole} --policy-arn arn:aws:iam::aws:policy/AdministratorAccess"
