AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - IAM policy with wildcard Action (*) allowing all actions

Metadata:
  Misconfiguration:
    Category: "IAM-OverPermission"
    Severity: "HIGH"
    RuleId: "IAM-001"
    Description: "IAM policy allows ALL actions (*) which violates least privilege"
    Remediation: "Restrict actions to only required services"
    Keywords:
      - "Action *"
      - "iam wildcard action"
      - "over permissive policy"
      - "Effect Allow Resource *"
      - "full access policy"
    ML_Label: "misconfiguration"

Resources:

  OverPermissiveUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub "wildcard-action-user-${AWS::StackName}"
      Tags:
        - Key: Name
          Value: "Wildcard-User"
        - Key: Misconfiguration
          Value: "IAM-001"
        - Key: Category
          Value: "IAM-OverPermission"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-2"

  WildcardActionPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "WildcardActionPolicy-${AWS::StackName}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"

            # MISCONFIGURATION: Allows ALL actions
            Action: "*"

            # MISCONFIGURATION: On ALL resources
            Resource: "*"

      Users:
        - !Ref OverPermissiveUser

  UserAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref OverPermissiveUser

Outputs:
  Username:
    Description: "Over-permissive IAM user"
    Value: !Ref OverPermissiveUser

  AccessKeyId:
    Description: "Access Key ID"
    Value: !Ref UserAccessKey

  SecretAccessKey:
    Description: "Secret Access Key"
    Value: !GetAtt UserAccessKey.SecretAccessKey

  Risk:
    Description: "Security Risk"
    Value: "User can perform ANY action on ANY AWS resource."

  FixCommand:
    Description: "Remediation Command"
    Value: !Sub "aws iam delete-user-policy --user-name ${OverPermissiveUser} --policy-name WildcardActionPolicy-${AWS::StackName}"
