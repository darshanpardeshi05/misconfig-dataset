AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - Lambda execution role with overly permissive permissions (AdministratorAccess)

Metadata:
  Misconfiguration:
    Category: "IAM & Access Over-Permission"
    Severity: "CRITICAL"
    RuleId: "IAM-012"
    Description: "Lambda execution role has AdministratorAccess managed policy attached. Compromised Lambda function can be used to attack any AWS resource."
    Remediation: "Replace AdministratorAccess with least privilege policy specific to Lambda's needs."
    Keywords:
      - "lambda.amazonaws.com"
      - "AdministratorAccess"
      - "Action: '*'"
      - "Resource: '*'"
      - "lambda execution role"
      - "ManagedPolicyArns"
    ML_Label: "misconfiguration"

Resources:
  OverlyPermissiveLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "lambda-overly-permissive-role-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service: "lambda.amazonaws.com"
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AdministratorAccess"
      Tags:
        - Key: Name
          Value: "Lambda-Overly-Permissive-Role"
        - Key: Misconfiguration
          Value: "IAM-012"
        - Key: Category
          Value: "IAM-OverPermission"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  DangerousLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "dangerous-lambda-function-${AWS::StackName}"
      Handler: "index.handler"
      Runtime: "python3.9"
      Role: !GetAtt OverlyPermissiveLambdaRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              print("This Lambda has full admin access due to overly permissive role.")
              return {"statusCode": 200, "body": "Dangerous function executed"}
      Tags:
        - Key: Name
          Value: "Dangerous-Lambda-Function"
        - Key: Misconfiguration
          Value: "IAM-012"
        - Key: Category
          Value: "IAM-OverPermission"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

Outputs:
  LambdaFunctionName:
    Description: "Lambda function with overly permissive role"
    Value: !Ref DangerousLambdaFunction
  RoleName:
    Description: "Lambda execution role with AdministratorAccess"
    Value: !Ref OverlyPermissiveLambdaRole
  Risk:
    Description: "Security Risk"
    Value: "If this Lambda function is compromised, attacker gains full admin access to your AWS account."
  RemediationCommand:
    Description: "Fix: Replace AdministratorAccess with least privilege policy"
    Value: !Sub "aws iam detach-role-policy --role-name ${OverlyPermissiveLambdaRole} --policy-arn arn:aws:iam::aws:policy/AdministratorAccess && aws iam put-role-policy --role-name ${OverlyPermissiveLambdaRole} --policy-name LeastPrivilege --policy-document '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"logs:CreateLogGroup\",\"logs:CreateLogStream\",\"logs:PutLogEvents\"],\"Resource\":\"*\"}]}'"
  EmergencyFix:
    Description: "Delete the Lambda function and role if compromised"
    Value: !Sub "aws lambda delete-function --function-name ${DangerousLambdaFunction} && aws iam delete-role --role-name ${OverlyPermissiveLambdaRole}"
