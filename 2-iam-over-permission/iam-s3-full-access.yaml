AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - IAM user with inline s3:* access (full S3 permissions)

Metadata:
  Misconfiguration:
    Id: "MISCONFIG-015"
    Batch: "Batch-3"
    Category: "IAM & Access Over-Permission"
    Severity: "HIGH"
    RuleId: "IAM-005"
    Service: "IAM"
    ResourceType: "AWS::IAM::User"
    Description: "IAM user has s3:* permission - can perform ANY S3 action on ANY S3 resource in the account"
    Impact: "User can read, write, delete, and modify permissions for all S3 buckets and objects"
    Remediation: "Replace s3:* with specific actions and restrict to specific bucket ARNs"

    Keywords:
      - "s3:*"
      - "Action: s3:*"
      - "arn:aws:s3:::*"
      - "Effect: Allow"

    ML_Label: "misconfiguration"

Resources:

  S3FullAccessUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub "s3-full-access-user-${AWS::StackName}"
      Tags:
        - Key: Name
          Value: "S3-Full-Access-User"
        - Key: Misconfiguration
          Value: "IAM-S3-Full-Access"
        - Key: MisconfigId
          Value: "MISCONFIG-015"
        - Key: Batch
          Value: "Batch-3"
        - Key: Category
          Value: "IAM-OverPermission"
        - Key: Severity
          Value: "HIGH"
        - Key: ToolDetection
          Value: "Prowler,ScoutSuite,Custodian"

  S3FullAccessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "S3FullAccessPolicy-${AWS::StackName}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Action: "s3:*"   # MISCONFIGURATION
            Resource:
              - "arn:aws:s3:::*"
              - "arn:aws:s3:::*/*"
      Users:
        - !Ref S3FullAccessUser

  UserAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref S3FullAccessUser

Outputs:
  Username:
    Description: "IAM user with full S3 access"
    Value: !Ref S3FullAccessUser

  MisconfigId:
    Description: "Unique Misconfiguration ID"
    Value: "MISCONFIG-015"

  RiskLevel:
    Description: "Risk Severity"
    Value: "HIGH"

  Remediation:
    Description: "Fix: Restrict S3 permissions"
    Value: "Replace s3:* with least privilege actions and specific bucket ARNs"
