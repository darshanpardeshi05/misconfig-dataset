AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - IAM access key older than 90 days not rotated

Metadata:
  Misconfiguration:
    Category: "IAM & Access Over-Permission"
    Severity: "MEDIUM"
    RuleId: "IAM-010"
    Description: "IAM access key is older than 90 days and has not been rotated"
    Remediation: "Rotate access keys every 90 days"
    Keywords:
      - "AccessKey"
      - "CreateDate"
      - "Key rotation"
      - "Old access key"
      - "> 90 days"
    ML_Label: "misconfiguration"

Resources:

# =========================================================
# USER WITH OLD ACCESS KEY (NORMAL USER)
# =========================================================
  UserWithOldKey:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub "user-old-key-${AWS::StackName}"
      Tags:
        - Key: Name
          Value: "User-Old-Key"
        - Key: Misconfiguration
          Value: "IAM-010"
        - Key: Category
          Value: "IAM-OverPermission"
        - Key: Severity
          Value: "MEDIUM"
        - Key: KeyAge
          Value: "Old (>90 days simulated)"

  OldAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref UserWithOldKey
      Status: Active

# =========================================================
# ADMIN USER WITH OLD ACCESS KEY (HIGH RISK)
# =========================================================
  AdminUserOldKey:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub "admin-old-key-${AWS::StackName}"
      Tags:
        - Key: Name
          Value: "Admin-Old-Key"
        - Key: Misconfiguration
          Value: "IAM-010"
        - Key: Category
          Value: "IAM-OverPermission"
        - Key: Severity
          Value: "MEDIUM"

  AdminAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref AdminUserOldKey
      Status: Active

  AdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "AdminFullAccess-${AWS::StackName}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: "*"
            Resource: "*"
      Users:
        - !Ref AdminUserOldKey

# =========================================================
# SERVICE ACCOUNT WITH OLD KEY (REAL-WORLD SCENARIO)
# =========================================================
  ServiceUserOldKey:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub "service-old-key-${AWS::StackName}"
      Tags:
        - Key: Name
          Value: "Service-Old-Key"
        - Key: Misconfiguration
          Value: "IAM-010"
        - Key: Category
          Value: "IAM-OverPermission"
        - Key: Severity
          Value: "MEDIUM"

  ServiceAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref ServiceUserOldKey
      Status: Active

  ServicePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "ServiceLimitedAccess-${AWS::StackName}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - "s3:GetObject"
              - "s3:PutObject"
            Resource: "*"
      Users:
        - !Ref ServiceUserOldKey

# =========================================================
# OUTPUTS
# =========================================================
Outputs:
  NormalUser:
    Description: "Normal user with old key"
    Value: !Ref UserWithOldKey

  AdminUser:
    Description: "Admin user with old key (higher risk)"
    Value: !Ref AdminUserOldKey

  ServiceUser:
    Description: "Service account with old key"
    Value: !Ref ServiceUserOldKey

  Risk:
    Description: "Security Risk"
    Value: "Old access keys increase risk of credential exposure and unauthorized access."

  CheckKeysCommand:
    Description: "Check key age"
    Value: "aws iam list-access-keys --user-name <USERNAME>"

  FixCommand:
    Description: "Rotate key"
    Value: "aws iam update-access-key --user-name <USERNAME> --access-key-id <KEY_ID> --status Inactive && aws iam delete-access-key --user-name <USERNAME> --access-key-id <KEY_ID>"
