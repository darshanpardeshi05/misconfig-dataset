AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - IAM access key older than 90 days not rotated

Metadata:
  Misconfiguration:
    Category: "IAM & Access Over-Permission"
    Severity: "MEDIUM"
    RuleId: "IAM-010"
    Description: "IAM access key is older than 90 days and has not been rotated"
    Remediation: "Rotate access keys every 90 days"

Resources:

# =========================================================
# USER WITH OLD ACCESS KEY (NORMAL USER)
# =========================================================
  UserWithOldKey:
    Type: AWS::IAM::User
    Properties:
      UserName: "user-old-key"
      Tags:
        - Key: KeyAge
          Value: "Old (>90 days simulated)"

  OldAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref UserWithOldKey
      Status: Active

# =========================================================
# ADMIN USER WITH OLD ACCESS KEY (HIGH RISK)
# =========================================================
  AdminUserOldKey:
    Type: AWS::IAM::User
    Properties:
      UserName: "admin-old-key"

  AdminAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref AdminUserOldKey
      Status: Active

  AdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: "AdminFullAccess"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: "*"
            Resource: "*"
      Users:
        - !Ref AdminUserOldKey

# =========================================================
# SERVICE ACCOUNT WITH OLD KEY (REAL-WORLD SCENARIO)
# =========================================================
  ServiceUserOldKey:
    Type: AWS::IAM::User
    Properties:
      UserName: "service-old-key"

  ServiceAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref ServiceUserOldKey
      Status: Active

  ServicePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: "ServiceLimitedAccess"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - "s3:GetObject"
              - "s3:PutObject"
            Resource: "*"
      Users:
        - !Ref ServiceUserOldKey

# =========================================================
# OUTPUTS
# =========================================================
Outputs:

  NormalUser:
    Value: !Ref UserWithOldKey

  AdminUser:
    Value: !Ref AdminUserOldKey

  ServiceUser:
    Value: !Ref ServiceUserOldKey

  CheckKeysCommand:
    Value: "aws iam list-access-keys --user-name <USERNAME>"

  FixCommand:
    Value: "aws iam update-access-key --user-name <USERNAME> --access-key-id <KEY_ID> --status Inactive && aws iam delete-access-key --user-name <USERNAME> --access-key-id <KEY_ID>"
