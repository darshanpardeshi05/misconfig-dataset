AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - IAM role trust policy with Principal: "*" allowing ANYONE to assume the role

Metadata:
  Misconfiguration:
    Category: "IAM & Access Over-Permission"
    Severity: "CRITICAL"
    RuleId: "IAM-011"
    Description: "IAM role trust policy uses Principal: '*' which allows ANY AWS account or ANY user to assume this role. This is extremely dangerous."
    Remediation: "Replace Principal: '*' with specific AWS account IDs or specific IAM users/roles"
    Keywords:
      - "Principal: '*'"
      - "Principal: \"*\""
      - "Principal: [*]"
      - "sts:AssumeRole"
      - "Trust policy"
      - "AssumeRolePolicyDocument"
    ML_Label: "misconfiguration"

Resources:
  DangerousRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "dangerous-trust-policy-role-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal: "*"
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AdministratorAccess"
      Tags:
        - Key: Name
          Value: "Dangerous-Trust-Role"
        - Key: Misconfiguration
          Value: "IAM-011"
        - Key: Category
          Value: "IAM-OverPermission"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

Outputs:
  RoleName:
    Description: "Role that ANYONE can assume (Admin access)"
    Value: !Ref DangerousRole
  RoleArn:
    Description: "ARN of the dangerous role"
    Value: !GetAtt DangerousRole.Arn
  Risk:
    Description: "Security Risk"
    Value: "ANY user from ANY AWS account can assume this role. Attackers can create a free AWS account and assume your role to gain admin access."
  AssumeRoleCommand:
    Description: "Command ANYONE can use to assume this role"
    Value: !Sub "aws sts assume-role --role-arn ${GetAtt DangerousRole.Arn} --role-session-name attack"
  RemediationCommand:
    Description: "Fix: Replace Principal: '*' with specific account IDs"
    Value: !Sub "aws iam update-assume-role-policy --role-name ${DangerousRole} --policy-document '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":{\"AWS\":\"arn:aws:iam::YOUR_ACCOUNT_ID:root\"},\"Action\":\"sts:AssumeRole\"}]}'"
  EmergencyFix:
    Description: "EMERGENCY: Delete the role immediately if found"
    Value: !Sub "aws iam delete-role --role-name ${DangerousRole}"
