AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - Inactive IAM user not deleted (credentials still active)

Metadata:
  Misconfiguration:
    Id: "MISCONFIG-019"
    Batch: "Batch-4"
    Category: "IAM & Access Over-Permission"
    Severity: "MEDIUM"
    RuleId: "IAM-009"
    Service: "IAM"
    ResourceType: "AWS::IAM::User"
    Description: "IAM user is inactive but still has active credentials"
    Impact: "Orphaned account can be abused without detection"
    Remediation: "Delete inactive IAM users or disable credentials"

    Keywords:
      - "Inactive user"
      - "AccessKey Active"
      - "Orphaned account"
      - "LoginProfile"
      - "Unused credentials"

    ML_Label: "misconfiguration"

Resources:

  InactiveUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub "inactive-user-${AWS::StackName}"
      LoginProfile:
        Password: "OldPassword123!"
        PasswordResetRequired: false
      Tags:
        - Key: Name
          Value: "Inactive-User"
        - Key: Misconfiguration
          Value: "IAM-Inactive-User"
        - Key: MisconfigId
          Value: "MISCONFIG-019"
        - Key: Batch
          Value: "Batch-4"
        - Key: Category
          Value: "IAM-OverPermission"
        - Key: Severity
          Value: "MEDIUM"
        - Key: Status
          Value: "Inactive"
        - Key: LastActive
          Value: "2023-01-01"
        - Key: ToolDetection
          Value: "Prowler,ScoutSuite,Custodian"

  InactiveUserAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref InactiveUser
      Status: Active   # MISCONFIGURATION

  InactiveUserPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "InactiveUserPolicy-${AWS::StackName}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Action:
              - "s3:GetObject"
              - "ec2:DescribeInstances"
            Resource: "*"
      Users:
        - !Ref InactiveUser

Outputs:
  Username:
    Description: "Inactive IAM user"
    Value: !Ref InactiveUser

  MisconfigId:
    Description: "Unique Misconfiguration ID"
    Value: "MISCONFIG-019"

  Risk:
    Description: "Security Risk"
    Value: "Inactive user still has active credentials"

  CheckCommand:
    Description: "Check last usage"
    Value: !Sub "aws iam get-user --user-name ${InactiveUser}"

  Remediation:
    Description: "Delete or disable user"
    Value: !Sub "aws iam update-access-key --user-name ${InactiveUser} --access-key-id <KEY_ID> --status Inactive"
