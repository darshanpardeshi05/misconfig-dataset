AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - Root account without MFA enabled (Detection Reference)

Metadata:
  Misconfiguration:
    Id: "MISCONFIG-017"
    Batch: "Batch-4"
    Category: "IAM & Access Over-Permission"
    Severity: "CRITICAL"
    RuleId: "IAM-007"
    Service: "IAM"
    ResourceType: "Account"
    Description: "AWS Root account does not have MFA enabled"
    Impact: "Full account compromise risk if root credentials are exposed"
    Remediation: "Enable MFA on root account immediately"

    Keywords:
      - "RootMFAEnabled"
      - "Root without MFA"
      - "AccountMFAEnabled"
      - "VirtualMFADevice"

    ML_Label: "misconfiguration"

Resources:

  # Dummy resource ONLY for tagging + tracking in scans
  RootMFAReference:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/misconfig/root-mfa-${AWS::StackName}"
      Type: String
      Value: "Root MFA Disabled - Detection Reference"
      Tags:
        Misconfiguration: "IAM-Root-No-MFA"
        MisconfigId: "MISCONFIG-017"
        Batch: "Batch-4"
        Category: "IAM-OverPermission"
        Severity: "CRITICAL"
        ToolDetection: "Prowler,ScoutSuite,Custodian"

Outputs:
  MisconfigId:
    Description: "Unique Misconfiguration ID"
    Value: "MISCONFIG-017"

  Detection:
    Description: "Detected by security tools"
    Value: "Prowler: check_iam_root_mfa_enabled | ScoutSuite: Root MFA"

  CheckCommand:
    Description: "CLI check for MFA status"
    Value: "aws iam get-account-summary | grep AccountMFAEnabled"

  Remediation:
    Description: "Manual Fix Required"
    Value: "Enable MFA on root account via AWS Console"
