AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - IAM policy with wildcard Resource (*) allowing access to all resources

Metadata:
  Misconfiguration:
    Category: "IAM-OverPermission"
    Severity: "HIGH"
    RuleId: "IAM-002"
    Description: "IAM policy allows access to ALL resources (*) which is overly permissive"
    Remediation: "Restrict Resource to specific ARNs"
    Keywords:
      - "Resource *"
      - "iam wildcard resource"
      - "over permissive resource"
      - "s3 all buckets access"
      - "Resource star"
    ML_Label: "misconfiguration"

Resources:

  WildcardResourceUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub "wildcard-resource-user-${AWS::StackName}"
      Tags:
        - Key: Name
          Value: "Wildcard-Resource-User"
        - Key: Misconfiguration
          Value: "IAM-002"
        - Key: Category
          Value: "IAM-OverPermission"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-2"

  WildcardResourcePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "WildcardResourcePolicy-${AWS::StackName}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"

            # Actions are limited (looks safe at first glance)
            Action:
              - "s3:GetObject"
              - "s3:ListBucket"
              - "s3:GetBucketLocation"

            # MISCONFIGURATION: Applies to ALL resources
            Resource: "*"

      Users:
        - !Ref WildcardResourceUser

  UserAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref WildcardResourceUser

Outputs:
  Username:
    Description: "IAM user with wildcard resource access"
    Value: !Ref WildcardResourceUser

  AccessKeyId:
    Description: "Access Key ID"
    Value: !Ref UserAccessKey

  SecretAccessKey:
    Description: "Secret Access Key"
    Value: !GetAtt UserAccessKey.SecretAccessKey

  Risk:
    Description: "Security Risk"
    Value: "User can access data from ANY S3 bucket in the account."

  FixCommand:
    Description: "Remediation Command"
    Value: !Sub "aws iam delete-user-policy --user-name ${WildcardResourceUser} --policy-name WildcardResourcePolicy-${AWS::StackName}"
