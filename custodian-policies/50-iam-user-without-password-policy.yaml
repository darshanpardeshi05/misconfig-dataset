policies:
- name: check-iam-user-without-password-policy
  resource: aws.iam-user
  description: "IAM users have passwords but no account\u2011wide password policy\
    \ is enforced. Passwords never expire, there are no complexity requirements, and\
    \ passwords can be reused indefinitely."
  metadata:
    rule_id: IAM-015
    category: Insecure Defaults
    severity: MEDIUM
    remediation: Enable AWS account password policy with minimum length, complexity,
      and expiration (e.g., 90 days).
    keywords:
    - PasswordPolicy
    - MinimumPasswordLength
    - RequireUppercaseCharacters
    - RequireLowercaseCharacters
    - RequireNumbers
    - RequireSymbols
    - MaxPasswordAge
  filters:
  - type: value
    key: tag:Misconfiguration
    value: IAM-015
