policies:
- name: check-ec2-default-credential-report-not-enabled
  resource: aws.iam-user
  description: IAM credential reports are not generated on a regular schedule. Without
    regular credential reports, you cannot audit user access keys, MFA status, password
    ages, or last activity.
  metadata:
    rule_id: IAM-014
    category: Insecure Defaults
    severity: LOW
    remediation: Schedule automated IAM credential report generation using EventBridge
      and Lambda
    keywords:
    - credential report
    - get-credential-report
    - generate-credential-report
    - IAM reporting
    - AWS::IAM::User
  filters:
  - type: value
    key: tag:Misconfiguration
    value: IAM-014
  actions:
  - type: notify
    template: default
    priority: info
