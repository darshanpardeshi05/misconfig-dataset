policies:
- name: check-rds-encryption-disabled
  resource: aws.rds
  description: RDS database instance has encryption disabled. All database data, backups,
    read replicas, and snapshots are stored unencrypted at rest.
  metadata:
    rule_id: RDS-003
    category: Lack of Encryption
    severity: HIGH
    remediation: 'Enable encryption when creating RDS instances. Note: Encryption
      cannot be enabled on existing unencrypted RDS instances without migration.'
    keywords:
    - 'StorageEncrypted: false'
    - RDS encryption
    - database encryption
    - KmsKeyId
  filters:
  - type: value
    key: tag:Misconfiguration
    value: RDS-003
  actions:
  - type: notify
    template: default
    priority: info
