policies:
- name: check-lambda-execution-role-overly-permissive
  resource: aws.iam-user
  description: Lambda execution role has AdministratorAccess managed policy attached.
    Compromised Lambda function can be used to attack any AWS resource.
  metadata:
    rule_id: IAM-012
    category: IAM & Access Over-Permission
    severity: CRITICAL
    remediation: Replace AdministratorAccess with least privilege policy specific
      to Lambda's needs.
    keywords:
    - lambda.amazonaws.com
    - AdministratorAccess
    - 'Action: ''*'''
    - 'Resource: ''*'''
    - lambda execution role
    - ManagedPolicyArns
  filters:
  - type: value
    key: tag:Misconfiguration
    value: IAM-012
