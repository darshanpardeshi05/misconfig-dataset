policies:
- name: check-ami-public
  resource: aws.ami
  description: AMI is shared publicly with all AWS accounts (anyone can launch EC2
    instances from this image)
  metadata:
    rule_id: AMI-001
    category: Storage-Exposure
    severity: CRITICAL
    remediation: Modify AMI permissions to private or specific accounts only
    keywords:
    - AMI public
    - modify-image-attribute
    - launchPermission all
    - public AMI
    - shared image
  filters:
  - type: value
    key: tag:Misconfiguration
    value: AMI-001
  actions:
  - type: notify
    template: default
    priority: info
