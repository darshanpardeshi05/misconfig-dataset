policies:
- name: check-config-recorder-disabled
  resource: aws.config
  description: AWS Config recorder is disabled. No configuration history, change tracking,
    or compliance monitoring for AWS resources.
  metadata:
    rule_id: CONFIG-001
    category: Insecure Defaults
    severity: HIGH
    remediation: Enable AWS Config recorder in all regions with appropriate rules
      and S3 bucket delivery
    keywords:
    - ConfigurationRecorder
    - RecordingGroup
    - ConfigRecorder
    - DeliveryChannel
  filters:
  - type: value
    key: tag:Misconfiguration
    value: CONFIG-001
  actions:
  - type: notify
    template: default
    priority: info
