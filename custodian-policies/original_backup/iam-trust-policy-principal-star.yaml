policies:
- name: check-iam-trust-policy-principal-star
  resource: aws.iam-user
  description: 'IAM role trust policy uses Principal: ''*'' which allows ANY AWS account
    or ANY user to assume this role. This is extremely dangerous.'
  metadata:
    rule_id: IAM-011
    category: IAM & Access Over-Permission
    severity: CRITICAL
    remediation: 'Replace Principal: ''*'' with specific AWS account IDs or specific
      IAM users/roles'
    keywords:
    - 'Principal: ''*'''
  filters:
  - type: value
    key: tag:Misconfiguration
    value: IAM-011
  actions:
  - type: notify
    template: default
    priority: info
