policies:
- name: check-rds-snapshot-public
  resource: aws.rds
  description: RDS snapshot is shared publicly with all AWS accounts
  metadata:
    rule_id: RDS-001
    category: Storage-Exposure
    severity: CRITICAL
    remediation: Modify snapshot permissions to private or specific accounts only
    keywords:
    - RDS snapshot public
    - modify-db-snapshot-attribute
    - restore all
    - public database snapshot
    - unencrypted RDS
  filters:
  - type: value
    key: tag:Misconfiguration
    value: RDS-001
  actions:
  - type: notify
    template: default
    priority: info
