policies:
- name: check-iam-admin-role
  resource: aws.iam-user
  description: IAM role has AdministratorAccess managed policy attached, granting
    full admin permissions
  metadata:
    rule_id: IAM-004
    category: IAM-OverPermission
    severity: CRITICAL
    remediation: Detach AdministratorAccess and apply least-privilege policies
    keywords:
    - AdministratorAccess
    - iam admin role
    - managed policy admin
    - full access role
    - iam role over permissive
  filters:
  - type: value
    key: tag:Misconfiguration
    value: IAM-004
  actions:
  - type: notify
    template: default
    priority: info
