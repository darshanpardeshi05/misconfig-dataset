policies:
- name: check-iam-missing-mfa-user
  resource: aws.iam-user
  description: IAM user does not have MFA enabled
  metadata:
    rule_id: IAM-008
    category: IAM & Access Over-Permission
    severity: HIGH
    remediation: Enable MFA for the IAM user using Virtual MFA device
    keywords:
    - MFADevice
    - VirtualMFADevice
    - User without MFA
    - LoginProfile
    - aws:MultiFactorAuthPresent
  filters:
  - type: value
    key: tag:Misconfiguration
    value: IAM-008
  actions:
  - type: notify
    template: default
    priority: info
