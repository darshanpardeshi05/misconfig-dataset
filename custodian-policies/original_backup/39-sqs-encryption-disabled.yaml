policies:
- name: check-sqs-encryption-disabled
  resource: aws.sqs
  description: SQS queue does not have server-side encryption enabled. Messages are
    stored unencrypted at rest, potentially exposing sensitive data.
  metadata:
    rule_id: SQS-001
    category: Lack of Encryption
    severity: MEDIUM
    remediation: Enable SSE-SQS encryption using AWS managed KMS key or customer managed
      key
    keywords:
    - KmsMasterKeyId
    - SqsManagedSseEnabled
    - SSE
    - encryption
    - sqs
  filters:
  - type: value
    key: tag:Misconfiguration
    value: SQS-001
  actions:
  - type: notify
    template: default
    priority: info
