policies:
- name: check-efs-encryption-disabled
  resource: aws.efs
  description: EFS file system has encryption at rest disabled. All data stored on
    this file system (application files, logs, databases, backups) is stored unencrypted.
  metadata:
    rule_id: EFS-002
    category: Lack of Encryption
    severity: HIGH
    remediation: 'Enable encryption at rest when creating EFS file systems. Note:
      Cannot be enabled on existing file systems without data migration.'
    keywords:
    - 'Encrypted: false'
    - EFS encryption
    - KmsKeyId
    - FileSystem
  filters:
  - type: value
    key: tag:Misconfiguration
    value: EFS-002
  actions:
  - type: notify
    template: default
    priority: info
