policies:
- name: check-iam-ec2-full-access
  resource: aws.iam-user
  description: IAM user has ec2:* permission - can perform ANY EC2 action on ANY EC2
    resource in the account
  metadata:
    rule_id: IAM-006
    category: IAM & Access Over-Permission
    severity: HIGH
    remediation: Replace ec2:* with least privilege actions and restrict to specific
      resources
    keywords:
    - ec2:*
    - 'Action: ec2:*'
    - 'Resource: *'
    - ec2:RunInstances
    - ec2:TerminateInstances
  filters:
  - type: value
    key: tag:Misconfiguration
    value: IAM-006
  actions:
  - type: notify
    template: default
    priority: info
