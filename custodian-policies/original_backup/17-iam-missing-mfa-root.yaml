policies:
- name: check-iam-missing-mfa-root
  resource: aws.iam-user
  description: AWS Root account does not have MFA enabled
  metadata:
    rule_id: IAM-007
    category: IAM & Access Over-Permission
    severity: CRITICAL
    remediation: Enable MFA on root account immediately
    keywords:
    - RootMFAEnabled
    - Root without MFA
    - AccountMFAEnabled
    - VirtualMFADevice
  filters:
  - type: value
    key: tag:Misconfiguration
    value: IAM-007
  actions:
  - type: notify
    template: default
    priority: info
