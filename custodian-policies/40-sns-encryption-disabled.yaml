policies:
- name: check-sns-encryption-disabled
  resource: aws.sns
  description: SNS topic does not have server-side encryption enabled. Messages published
    to this topic are stored unencrypted at rest.
  metadata:
    rule_id: SNS-001
    category: Lack of Encryption
    severity: MEDIUM
    remediation: Enable SSE-SNS encryption using AWS managed KMS key or customer managed
      key
    keywords:
    - KmsMasterKeyId
    - TopicEncryption
    - sns:Encrypt
    - sns:Decrypt
  filters:
  - type: value
    key: tag:Misconfiguration
    value: SNS-001
