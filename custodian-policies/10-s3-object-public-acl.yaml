policies:
- name: check-s3-object-public-acl
  resource: aws.s3
  description: Individual S3 object has public read ACL even though bucket is private
  metadata:
    rule_id: S3-005
    category: Storage-Exposure
    severity: HIGH
    remediation: Remove public-read ACL from object
    keywords:
    - s3 object acl public
    - public-read object
    - PutObjectAcl
    - object level exposure
    - s3 object public
  filters:
  - type: value
    key: tag:Misconfiguration
    value: S3-005
  actions:
  - type: notify
    template: default
    priority: info
