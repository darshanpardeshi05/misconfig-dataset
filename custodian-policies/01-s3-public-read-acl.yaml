policies:
- name: check-s3-public-read-acl
  resource: aws.s3
  description: S3 bucket allows public read access via ACL
  metadata:
    rule_id: S3-001
    category: Storage-Exposure
    severity: CRITICAL
    remediation: Set AccessControl to Private and enable BlockPublicAccess
    keywords:
    - PublicRead
    - S3 Public
    - Public ACL
    - BlockPublicAccess disabled
    - S3 bucket public
  filters:
  - type: value
    key: tag:Misconfiguration
    value: S3-001
