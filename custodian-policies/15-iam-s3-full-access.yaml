policies:
- name: check-iam-s3-full-access
  resource: aws.iam-user
  description: IAM user has s3:* permission - can perform ANY S3 action on ANY S3
    resource in the account
  metadata:
    rule_id: IAM-005
    category: IAM & Access Over-Permission
    severity: HIGH
    remediation: Replace s3:* with specific actions and restrict to specific bucket
      ARNs
    keywords:
    - s3:*
    - 'Action: s3:*'
    - arn:aws:s3:::*
    - 'Effect: Allow'
  filters:
  - type: value
    key: tag:Misconfiguration
    value: IAM-005
