policies:
- name: check-iam-inactive-user
  resource: aws.iam-user
  description: IAM user is inactive but still has active credentials
  metadata:
    rule_id: IAM-009
    category: IAM & Access Over-Permission
    severity: MEDIUM
    remediation: Delete inactive IAM users or disable credentials
    keywords:
    - Inactive user
    - AccessKey Active
    - Orphaned account
    - LoginProfile
    - Unused credentials
  filters:
  - type: value
    key: tag:Misconfiguration
    value: IAM-009
  actions:
  - type: notify
    template: default
    priority: info
