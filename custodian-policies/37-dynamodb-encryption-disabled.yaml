policies:
- name: check-dynamodb-encryption-disabled
  resource: aws.dynamodb
  description: DynamoDB table uses default AWS owned encryption key instead of customer
    managed KMS key. While data is encrypted, customer lacks control over key rotation
    and audit capabilities.
  metadata:
    rule_id: DYNAMODB-001
    category: Lack of Encryption
    severity: MEDIUM
    remediation: Enable server-side encryption with customer managed KMS key for better
      security and compliance
    keywords:
    - SSESpecification
    - KMSMasterKeyId
    - AWS owned key
    - default encryption
    - SSEEnabled
  filters:
  - type: value
    key: tag:Misconfiguration
    value: DYNAMODB-001
