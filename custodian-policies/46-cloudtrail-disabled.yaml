policies:
- name: check-cloudtrail-disabled
  resource: aws.ec2
  description: AWS CloudTrail is disabled. No API activity logs are captured, making
    it impossible to audit who did what, when, and from where in your AWS account.
  metadata:
    rule_id: CT-001
    category: Insecure Defaults
    severity: HIGH
    remediation: Enable CloudTrail in all regions with log file validation and encryption.
      Send logs to CloudWatch Logs and S3 bucket with appropriate permissions.
    keywords:
    - CloudTrail
    - Trail
    - IsMultiRegionTrail
    - EnableLogFileValidation
    - S3BucketName
  filters:
  - type: value
    key: tag:Misconfiguration
    value: CT-001
  actions:
  - type: notify
    template: default
    priority: info
