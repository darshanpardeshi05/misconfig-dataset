policies:
- name: check-iam-wildcard-both
  resource: aws.iam-user
  description: IAM policy grants full administrative access using Action '*' and Resource
    '*'
  metadata:
    rule_id: IAM-003
    category: IAM-OverPermission
    severity: CRITICAL
    remediation: Remove policy and enforce least-privilege access
    keywords:
    - Action * Resource *
    - full admin policy
    - iam full access
    - over permissive iam
    - administrator equivalent
  filters:
  - type: value
    key: tag:Misconfiguration
    value: IAM-003
