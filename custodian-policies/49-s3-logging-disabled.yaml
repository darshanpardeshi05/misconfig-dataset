policies:
- name: check-s3-logging-disabled
  resource: aws.s3
  description: S3 bucket does not have access logging enabled. No logs are captured
    for who accessed which objects, when, and from where.
  metadata:
    rule_id: S3-008
    category: Insecure Defaults
    severity: MEDIUM
    remediation: Enable S3 server access logging to a dedicated logging bucket with
      proper permissions.
    keywords:
    - LoggingConfiguration
    - TargetBucket
    - TargetPrefix
    - Server access logging
  filters:
  - type: value
    key: tag:Misconfiguration
    value: S3-008
