policies:
- name: check-ecr-repository-public
  resource: aws.ecr
  description: ECR repository allows public pull access (anyone can pull images without
    authentication)
  metadata:
    rule_id: ECR-001
    category: Storage-Exposure
    severity: HIGH
    remediation: Restrict repository policy to specific IAM principals and enable
      image scanning
    keywords:
    - ECR public
    - Principal *
    - public repository
    - docker pull public
    - ScanOnPush false
  filters:
  - type: value
    key: tag:Misconfiguration
    value: ECR-001
