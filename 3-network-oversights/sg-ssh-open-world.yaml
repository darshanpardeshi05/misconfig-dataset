AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - Security group allows SSH (port 22) from 0.0.0.0/0

Metadata:
  Misconfiguration:
    Category: "Network Oversights"
    Severity: "HIGH"
    RuleId: "SG-001"
    Description: "Security group allows SSH access from entire internet (0.0.0.0/0). This exposes EC2 instances to brute force attacks."
    Remediation: "Restrict SSH access to specific IP addresses or VPN ranges only"
    Keywords:
      - "port 22"
      - "0.0.0.0/0"
      - "CidrIp: 0.0.0.0/0"
      - "FromPort: 22"
      - "ToPort: 22"
      - "SSH"
    ML_Label: "misconfiguration"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "SSH-Misconfig-VPC"
        - Key: Misconfiguration
          Value: "SG-001"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-5"

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "SSH-Public-Subnet"
        - Key: Misconfiguration
          Value: "SG-001"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-5"

  SSLOpenSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "MISCONFIGURATION - SSH open to world"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIpv6: "::/0"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: "SSH-Open-SG"
        - Key: Misconfiguration
          Value: "SG-001"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-5"

  ExposedEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !FindInMap [AWSRegionArch2AMI, !Ref "AWS::Region", AMI]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SSLOpenSecurityGroup
      Tags:
        - Key: Name
          Value: "Exposed-SSH-Instance"
        - Key: Misconfiguration
          Value: "SG-001"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-5"

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

Mappings:
  AWSRegionArch2AMI:
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    us-west-2:
      AMI: ami-0d70546e43a328d54
    eu-west-1:
      AMI: ami-07470b0ad10cbe60e

Outputs:
  SecurityGroupId:
    Description: "Security group ID with SSH open to world"
    Value: !Ref SSLOpenSecurityGroup
  InstanceId:
    Description: "EC2 instance exposed to SSH attacks"
    Value: !Ref ExposedEC2Instance
  Risk:
    Description: "Security Risk"
    Value: "Anyone on internet can attempt to SSH into this instance. Attackers constantly scan for port 22 and attempt brute force attacks."
  RemediationCommand:
    Description: "Fix: Restrict SSH to specific IPs"
    Value: !Sub "aws ec2 revoke-security-group-ingress --group-id ${SSLOpenSecurityGroup} --protocol tcp --port 22 --cidr 0.0.0.0/0 && aws ec2 authorize-security-group-ingress --group-id ${SSLOpenSecurityGroup} --protocol tcp --port 22 --cidr YOUR_CORPORATE_IP/32"
