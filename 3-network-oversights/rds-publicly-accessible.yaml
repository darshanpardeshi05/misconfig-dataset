AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - RDS database with PubliclyAccessible = true (database exposed to internet)

Metadata:
  Misconfiguration:
    Category: "Network Oversights"
    Severity: "CRITICAL"
    RuleId: "RDS-002"
    Description: "RDS database has PubliclyAccessible=true, meaning it has a public IP address and is accessible from the internet. Databases should never be publicly accessible."
    Remediation: "Set PubliclyAccessible=false. Database should only be accessible from within VPC. Use bastion host or VPN if external access is needed."
    Keywords:
      - "PubliclyAccessible: true"
      - "RDS public"
      - "database public"
      - "0.0.0.0/0"
      - "port 3306"
    ML_Label: "misconfiguration"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.8.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "RDS-Public-VPC"
        - Key: Misconfiguration
          Value: "RDS-002"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-7"

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.8.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "RDS-Public-Subnet-1"
        - Key: Misconfiguration
          Value: "RDS-002"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-7"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.9.0/24"
      AvailabilityZone: !Sub "${AWS::Region}b"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "RDS-Public-Subnet-2"
        - Key: Misconfiguration
          Value: "RDS-002"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-7"

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Database security group - MISCONFIGURATION"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: "0.0.0.0/0"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: "RDS-Public-SG"
        - Key: Misconfiguration
          Value: "RDS-002"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-7"

  PublicMySQLDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "public-mysql-db-${AWS::StackName}"
      DBInstanceClass: db.t3.micro
      Engine: mysql
      EngineVersion: "8.0"
      MasterUsername: "admin"
      MasterUserPassword: "WeakPassword123!"
      AllocatedStorage: 20
      StorageEncrypted: false
      PubliclyAccessible: true
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroup
      DBSubnetGroupName: !Ref PublicDBSubnetGroup
      BackupRetentionPeriod: 0
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: "Public-MySQL-DB"
        - Key: Misconfiguration
          Value: "RDS-002"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-7"

  PublicDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Public subnet group - MISCONFIGURATION"
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Tags:
      - Key: Name
        Value: "RDS-Public-IGW"
      - Key: Batch
        Value: "Batch-7"

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: "RDS-Public-RT"
        - Key: Batch
          Value: "Batch-7"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref RouteTable

  SubnetRouteAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref RouteTable

Outputs:
  DatabaseEndpoint:
    Description: "Publicly accessible MySQL database endpoint"
    Value: !GetAtt PublicMySQLDatabase.Endpoint.Address
  Risk:
    Description: "Security Risk"
    Value: "Database has a PUBLIC IP address and is accessible from anywhere on internet. Attacker can attempt to connect, brute force credentials, and steal all data."
  RemediationCommand:
    Description: "Fix: Disable public accessibility and restrict security group"
    Value: !Sub "aws rds modify-db-instance --db-instance-identifier ${PublicMySQLDatabase} --no-publicly-accessible && aws ec2 revoke-security-group-ingress --group-id ${DatabaseSecurityGroup} --protocol tcp --port 3306 --cidr 0.0.0.0/0"
