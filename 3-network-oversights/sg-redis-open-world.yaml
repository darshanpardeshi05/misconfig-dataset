AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - Security group allows Redis (port 6379) from 0.0.0.0/0

Metadata:
  Misconfiguration:
    Category: "Network Oversights"
    Severity: "CRITICAL"
    RuleId: "SG-005"
    Description: "Security group allows Redis access from entire internet (0.0.0.0/0). Redis has no authentication by default - this is extremely dangerous."
    Remediation: "Restrict Redis access to specific application servers only. Enable Redis AUTH password if absolutely necessary."
    Keywords:
      - "port 6379"
      - "0.0.0.0/0"
      - "CidrIp: 0.0.0.0/0"
      - "FromPort: 6379"
      - "ToPort: 6379"
      - "Redis"
      - "ElastiCache"
    ML_Label: "misconfiguration"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.4.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "Redis-Misconfig-VPC"
        - Key: Misconfiguration
          Value: "SG-005"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.4.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "Redis-Public-Subnet"
        - Key: Misconfiguration
          Value: "SG-005"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  RedisOpenSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "MISCONFIGURATION - Redis open to world"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIpv6: "::/0"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: "Redis-Open-SG"
        - Key: Misconfiguration
          Value: "SG-005"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  ExposedRedisCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      ClusterId: !Sub "exposed-redis-cluster-${AWS::StackName}"
      Engine: redis
      CacheNodeType: cache.t3.micro
      NumCacheNodes: 1
      CacheSubnetGroupName: !Ref PublicCacheSubnetGroup
      VpcSecurityGroupIds:
        - !Ref RedisOpenSecurityGroup
      Tags:
        - Key: Name
          Value: "Exposed-Redis-Cluster"
        - Key: Misconfiguration
          Value: "SG-005"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  PublicCacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: "Public subnet group - MISCONFIGURATION"
      SubnetIds:
        - !Ref PublicSubnet

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

Outputs:
  SecurityGroupId:
    Description: "Security group ID with Redis open to world"
    Value: !Ref RedisOpenSecurityGroup
  RedisEndpoint:
    Description: "Redis cluster endpoint"
    Value: !GetAtt ExposedRedisCluster.RedisEndpoint.Address
  Risk:
    Description: "Security Risk"
    Value: "Redis has NO AUTHENTICATION by default. Anyone who can reach port 6379 can read, write, and delete all Redis data without a password."
  RemediationCommand:
    Description: "Fix: Restrict security group and enable AUTH"
    Value: !Sub "aws ec2 revoke-security-group-ingress --group-id ${RedisOpenSecurityGroup} --protocol tcp --port 6379 --cidr 0.0.0.0/0 && aws ec2 authorize-security-group-ingress --group-id ${RedisOpenSecurityGroup} --protocol tcp --port 6379 --cidr YOUR_APP_VPC_CIDR"
