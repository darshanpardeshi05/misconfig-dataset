AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - Security group allows RDP (port 3389) from 0.0.0.0/0

Metadata:
  Misconfiguration:
    Category: "Network Oversights"
    Severity: "HIGH"
    RuleId: "SG-002"
    Description: "Security group allows RDP access from entire internet (0.0.0.0/0). This exposes Windows EC2 instances to brute force attacks."
    Remediation: "Restrict RDP access to specific IP addresses or VPN ranges only"
    Keywords:
      - "port 3389"
      - "0.0.0.0/0"
      - "CidrIp: 0.0.0.0/0"
      - "FromPort: 3389"
      - "ToPort: 3389"
      - "RDP"
    ML_Label: "misconfiguration"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.1.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "RDP-Misconfig-VPC"
        - Key: Misconfiguration
          Value: "SG-002"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-5"

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "RDP-Public-Subnet"
        - Key: Misconfiguration
          Value: "SG-002"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-5"

  RDPOpenSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "MISCONFIGURATION - RDP open to world"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIpv6: "::/0"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: "RDP-Open-SG"
        - Key: Misconfiguration
          Value: "SG-002"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-5"

  ExposedWindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !FindInMap [AWSRegionArch2AMI, !Ref "AWS::Region", WindowsAMI]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref RDPOpenSecurityGroup
      Tags:
        - Key: Name
          Value: "Exposed-RDP-Instance"
        - Key: Misconfiguration
          Value: "SG-002"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-5"

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

Mappings:
  AWSRegionArch2AMI:
    us-east-1:
      WindowsAMI: ami-0c2f2e2f8e2e2f2e2
    us-west-2:
      WindowsAMI: ami-0d7f8e2f2e2f2e2f2
    eu-west-1:
      WindowsAMI: ami-0e1f2e2f2e2f2e2f2

Outputs:
  SecurityGroupId:
    Description: "Security group ID with RDP open to world"
    Value: !Ref RDPOpenSecurityGroup
  InstanceId:
    Description: "Windows EC2 instance exposed to RDP attacks"
    Value: !Ref ExposedWindowsInstance
  Risk:
    Description: "Security Risk"
    Value: "Anyone on internet can attempt RDP into this Windows instance. Attackers constantly scan for port 3389 and attempt brute force attacks."
  RemediationCommand:
    Description: "Fix: Restrict RDP to specific IPs"
    Value: !Sub "aws ec2 revoke-security-group-ingress --group-id ${RDPOpenSecurityGroup} --protocol tcp --port 3389 --cidr 0.0.0.0/0 && aws ec2 authorize-security-group-ingress --group-id ${RDPOpenSecurityGroup} --protocol tcp --port 3389 --cidr YOUR_CORPORATE_IP/32"
