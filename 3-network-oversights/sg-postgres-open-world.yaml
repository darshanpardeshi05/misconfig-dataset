AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - Security group allows PostgreSQL (port 5432) from 0.0.0.0/0

Metadata:
  Misconfiguration:
    Category: "Network Oversights"
    Severity: "CRITICAL"
    RuleId: "SG-004"
    Description: "Security group allows PostgreSQL access from entire internet (0.0.0.0/0). This exposes databases to direct attack and data theft."
    Remediation: "Restrict PostgreSQL access to specific application servers or VPC CIDR only. Databases should never be publicly accessible."
    Keywords:
      - "port 5432"
      - "0.0.0.0/0"
      - "CidrIp: 0.0.0.0/0"
      - "FromPort: 5432"
      - "ToPort: 5432"
      - "PostgreSQL"
      - "PubliclyAccessible"
    ML_Label: "misconfiguration"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.3.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "PostgreSQL-Misconfig-VPC"
        - Key: Misconfiguration
          Value: "SG-004"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.3.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "PostgreSQL-Public-Subnet-1"
        - Key: Misconfiguration
          Value: "SG-004"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.3.0/24"
      AvailabilityZone: !Sub "${AWS::Region}b"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "PostgreSQL-Public-Subnet-2"
        - Key: Misconfiguration
          Value: "SG-004"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  PostgresOpenSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "MISCONFIGURATION - PostgreSQL open to world"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIpv6: "::/0"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: "PostgreSQL-Open-SG"
        - Key: Misconfiguration
          Value: "SG-004"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  ExposedPostgresDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "exposed-postgres-db-${AWS::StackName}"
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: "15"
      MasterUsername: "postgres"
      MasterUserPassword: "WeakPassword123!"
      AllocatedStorage: 20
      StorageEncrypted: false
      PubliclyAccessible: true
      VPCSecurityGroups:
        - !Ref PostgresOpenSecurityGroup
      DBSubnetGroupName: !Ref PublicDBSubnetGroup
      Tags:
        - Key: Name
          Value: "Exposed-PostgreSQL-DB"
        - Key: Misconfiguration
          Value: "SG-004"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  PublicDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Public subnet group - MISCONFIGURATION"
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref RouteTable

  SubnetRouteAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref RouteTable

Outputs:
  SecurityGroupId:
    Description: "Security group ID with PostgreSQL open to world"
    Value: !Ref PostgresOpenSecurityGroup
  DatabaseEndpoint:
    Description: "Exposed PostgreSQL database endpoint"
    Value: !GetAtt ExposedPostgresDatabase.Endpoint.Address
  Risk:
    Description: "Security Risk"
    Value: "PostgreSQL database is accessible from ANYWHERE on internet. Attackers can attempt to connect, brute force passwords, and steal all data."
  RemediationCommand:
    Description: "Fix: Remove public access and restrict security group"
    Value: !Sub "aws rds modify-db-instance --db-instance-identifier ${ExposedPostgresDatabase} --no-publicly-accessible && aws ec2 revoke-security-group-ingress --group-id ${PostgresOpenSecurityGroup} --protocol tcp --port 5432 --cidr 0.0.0.0/0"
