AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - Security group allows ALL ports (-1) from 0.0.0.0/0

Metadata:
  Misconfiguration:
    Category: "Network Oversights"
    Severity: "CRITICAL"
    RuleId: "SG-007"
    Description: "Security group allows ALL traffic from entire internet (0.0.0.0/0). This is the worst possible network misconfiguration - completely exposes all resources."
    Remediation: "IMMEDIATELY remove this rule. Security groups should only allow specific ports needed for application functionality."
    Keywords:
      - "-1"
      - "0.0.0.0/0"
      - "CidrIp: 0.0.0.0/0"
      - "FromPort: -1"
      - "ToPort: -1"
      - "all ports"
      - "all traffic"
    ML_Label: "misconfiguration"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.6.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "AllPorts-Misconfig-VPC"
        - Key: Misconfiguration
          Value: "SG-007"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.6.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "AllPorts-Public-Subnet"
        - Key: Misconfiguration
          Value: "SG-007"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  AllPortsOpenSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "MISCONFIGURATION - ALL ports open to world"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
        - IpProtocol: "-1"
          CidrIpv6: "::/0"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: "AllPorts-Open-SG"
        - Key: Misconfiguration
          Value: "SG-007"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  FullyExposedEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !FindInMap [AWSRegionArch2AMI, !Ref "AWS::Region", AMI]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref AllPortsOpenSecurityGroup
      Tags:
        - Key: Name
          Value: "Fully-Exposed-Instance"
        - Key: Misconfiguration
          Value: "SG-007"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

Mappings:
  AWSRegionArch2AMI:
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    us-west-2:
      AMI: ami-0d70546e43a328d54
    eu-west-1:
      AMI: ami-07470b0ad10cbe60e

Outputs:
  SecurityGroupId:
    Description: "Security group ID with ALL ports open to world (CRITICAL)"
    Value: !Ref AllPortsOpenSecurityGroup
  InstanceId:
    Description: "EC2 instance with all ports open"
    Value: !Ref FullyExposedEC2Instance
  Risk:
    Description: "Security Risk"
    Value: "ALL ports (1-65535) are open to the internet. Any service running on this instance is exposed."
  RemediationCommand:
    Description: "URGENT FIX: Delete this security group rule immediately"
    Value: !Sub "aws ec2 revoke-security-group-ingress --group-id ${AllPortsOpenSecurityGroup} --protocol -1 --cidr 0.0.0.0/0"
