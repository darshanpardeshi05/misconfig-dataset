AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - Security group allows MongoDB (port 27017) from 0.0.0.0/0

Metadata:
  Misconfiguration:
    Category: "Network Oversights"
    Severity: "CRITICAL"
    RuleId: "SG-006"
    Description: "Security group allows MongoDB access from entire internet (0.0.0.0/0). MongoDB has no authentication by default in older versions - extremely dangerous."
    Remediation: "Restrict MongoDB access to specific application servers only. Enable MongoDB authentication and authorization."
    Keywords:
      - "port 27017"
      - "0.0.0.0/0"
      - "CidrIp: 0.0.0.0/0"
      - "FromPort: 27017"
      - "ToPort: 27017"
      - "MongoDB"
      - "DocumentDB"
    ML_Label: "misconfiguration"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.5.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "MongoDB-Misconfig-VPC"
        - Key: Misconfiguration
          Value: "SG-006"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.5.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "MongoDB-Public-Subnet"
        - Key: Misconfiguration
          Value: "SG-006"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  MongoDBOpenSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "MISCONFIGURATION - MongoDB open to world"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 27017
          ToPort: 27017
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 27017
          ToPort: 27017
          CidrIpv6: "::/0"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: "MongoDB-Open-SG"
        - Key: Misconfiguration
          Value: "SG-006"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  ExposedMongoDBInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !FindInMap [AWSRegionArch2AMI, !Ref "AWS::Region", AMI]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref MongoDBOpenSecurityGroup
      UserData:
        Fn::Base64: |
          #!/bin/bash
          # Install MongoDB (insecure configuration - no auth)
          cat > /etc/yum.repos.d/mongodb-org-7.0.repo << EOF
          [mongodb-org-7.0]
          name=MongoDB Repository
          baseurl=https://repo.mongodb.org/yum/amazon/2023/mongodb-org/7.0/x86_64/
          gpgcheck=1
          enabled=1
          gpgkey=https://www.mongodb.org/static/pgp/server-7.0.asc
          EOF
          yum install -y mongodb-org
          # Bind to all interfaces (insecure)
          sed -i 's/bindIp: 127.0.0.1/bindIp: 0.0.0.0/g' /etc/mongod.conf
          # No authentication enabled (default)
          systemctl start mongod
          systemctl enable mongod
      Tags:
        - Key: Name
          Value: "Exposed-MongoDB-Instance"
        - Key: Misconfiguration
          Value: "SG-006"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-5"

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

Mappings:
  AWSRegionArch2AMI:
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    us-west-2:
      AMI: ami-0d70546e43a328d54
    eu-west-1:
      AMI: ami-07470b0ad10cbe60e

Outputs:
  SecurityGroupId:
    Description: "Security group ID with MongoDB open to world"
    Value: !Ref MongoDBOpenSecurityGroup
  InstancePublicIp:
    Description: "Public IP of exposed MongoDB instance"
    Value: !GetAtt ExposedMongoDBInstance.PublicIp
  Risk:
    Description: "Security Risk"
    Value: "MongoDB has NO AUTHENTICATION by default. Anyone who can reach port 27017 can read, write, and delete all database contents without a password."
  RemediationCommand:
    Description: "Fix: Restrict security group and enable MongoDB auth"
    Value: !Sub "aws ec2 revoke-security-group-ingress --group-id ${MongoDBOpenSecurityGroup} --protocol tcp --port 27017 --cidr 0.0.0.0/0 && aws ec2 authorize-security-group-ingress --group-id ${MongoDBOpenSecurityGroup} --protocol tcp --port 27017 --cidr YOUR_APP_VPC_CIDR"
