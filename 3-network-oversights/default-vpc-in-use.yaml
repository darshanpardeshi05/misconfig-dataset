AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - Default VPC used instead of custom VPC with proper security controls

Metadata:
  Misconfiguration:
    Category: "Network Oversights"
    Severity: "MEDIUM"
    RuleId: "VPC-002"
    Description: "Resources are deployed in the Default VPC. Default VPC has auto-assigned public IPs, permissive default security group, and lacks proper network controls."
    Remediation: "Create custom VPC with private subnets, NAT gateways, and restricted security groups. Migrate all resources from default VPC."
    Keywords:
      - "Default VPC"
      - "isDefault"
      - "default-vpc"
      - "MapPublicIpOnLaunch: true"
      - "default security group"
    ML_Label: "misconfiguration"

Resources:
  # Launching an EC2 instance WITHOUT specifying VpcId or SubnetId
  # AWS will automatically launch it in the Default VPC and Default Subnet
  DefaultVPCInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !FindInMap [AWSRegionArch2AMI, !Ref "AWS::Region", AMI]
      # No VpcId, no SubnetId → uses Default VPC
      SecurityGroupIds:
        - !Ref DefaultVPCCompatibleSG
      Tags:
        - Key: Name
          Value: "Default-VPC-Instance"
        - Key: Misconfiguration
          Value: "VPC-002"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "MEDIUM"
        - Key: Batch
          Value: "Batch-7"

  # A permissive security group to mirror Default SG behavior (optional)
  DefaultVPCCompatibleSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Permissive security group for Default VPC demo"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: "Default-VPC-SG"
        - Key: Misconfiguration
          Value: "VPC-002"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "MEDIUM"
        - Key: Batch
          Value: "Batch-7"

Mappings:
  AWSRegionArch2AMI:
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    us-west-2:
      AMI: ami-0d70546e43a328d54
    eu-west-1:
      AMI: ami-07470b0ad10cbe60e

Outputs:
  InstanceId:
    Description: "EC2 instance deployed in Default VPC"
    Value: !Ref DefaultVPCInstance
  Risk:
    Description: "Security Risk"
    Value: "Using default VPC increases attack surface (auto-assigned public IPs, open default security group, no network segmentation)."
  RemediationCommand:
    Description: "Fix: Migrate to custom VPC"
    Value: "Create custom VPC with public/private subnets, then recreate resources in that VPC. Delete default VPC resources when migration is complete."
