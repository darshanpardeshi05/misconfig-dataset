AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - VPC Flow Logs disabled (no network traffic logging)

Metadata:
  Misconfiguration:
    Category: "Network Oversights"
    Severity: "MEDIUM"
    RuleId: "VPC-001"
    Description: "VPC Flow Logs are disabled. No network traffic logs are captured, making it impossible to detect unauthorized access, data exfiltration, or network attacks."
    Remediation: "Enable VPC Flow Logs for all VPCs and subnets. Send logs to CloudWatch Logs or S3 for analysis."
    Keywords:
      - "FlowLog"
      - "VPCFlowLogs"
      - "FlowLogsDisabled"
      - "No Flow Logs"
      - "vpc-flow-logs"
    ML_Label: "misconfiguration"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.7.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "VPC-No-Flow-Logs"
        - Key: Misconfiguration
          Value: "VPC-001"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "MEDIUM"
        - Key: Batch
          Value: "Batch-6"

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.7.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "Public-Subnet-No-Logs"
        - Key: Misconfiguration
          Value: "VPC-001"
        - Key: Category
          Value: "Network-Oversights"
        - Key: Severity
          Value: "MEDIUM"
        - Key: Batch
          Value: "Batch-6"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Tags:
      - Key: Name
        Value: "IGW-No-Logs"
      - Key: Batch
        Value: "Batch-6"

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: "Public-RT-No-Logs"
        - Key: Batch
          Value: "Batch-6"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  # =========================================================
  # MISCONFIGURATION: No Flow Logs resource is defined
  # =========================================================

Outputs:
  VPCId:
    Description: "VPC ID with Flow Logs disabled"
    Value: !Ref VPC
  Risk:
    Description: "Security Risk"
    Value: "Without VPC Flow Logs, you cannot detect unauthorized access attempts, identify data exfiltration, or investigate network-based attacks."
  RemediationCommand:
    Description: "Fix: Enable VPC Flow Logs"
    Value: !Sub "aws ec2 create-flow-logs --resource-ids ${VPC} --resource-type VPC --traffic-type ALL --log-destination-type cloud-watch-logs --log-group-name vpc-flow-logs --deliver-logs-permission-arn arn:aws:iam::${AWS::AccountId}:role/FlowLogsRole"
