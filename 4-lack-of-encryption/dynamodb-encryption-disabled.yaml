AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - DynamoDB table with encryption disabled (using default AWS owned key instead of customer managed KMS)

Metadata:
  Misconfiguration:
    Category: "Lack of Encryption"
    Severity: "MEDIUM"
    RuleId: "DYNAMODB-001"
    Description: "DynamoDB table uses default AWS owned encryption key instead of customer managed KMS key. While data is encrypted, customer lacks control over key rotation and audit capabilities."
    Remediation: "Enable server-side encryption with customer managed KMS key for better security and compliance"
    # KEYWORDS FOR KEYWORD-BASED DETECTION
    Keywords:
      - "SSESpecification"
      - "KMSMasterKeyId"
      - "SSEEnabled"
      - "AWS owned key"
      - "default encryption"
    # LABEL FOR ML-BASED DETECTION
    ML_Label: "misconfiguration"

Resources:
  # MISCONFIGURATION START: DynamoDB table with encryption disabled (using default AWS owned key)
  
  # MISCONFIGURATION 1: Table with NO explicit SSESpecification
  # This uses default AWS owned key (not customer controlled)
  UnencryptedDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: "unencrypted-dynamodb-table"
      AttributeDefinitions:
        - AttributeName: "id"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "id"
          KeyType: "HASH"
      BillingMode: "PAY_PER_REQUEST"
      # MISCONFIGURATION: No SSESpecification provided
      # DynamoDB will use default AWS owned key
      # Customer cannot control key rotation or audit key usage
      Tags:
        - Key: Misconfiguration
          Value: "DynamoDB-Default-Encryption"
        - Key: Severity
          Value: "MEDIUM"

  # MISCONFIGURATION 2: Table with SSESpecification but SSEEnabled = false (explicitly disabled)
  # Note: This is actually not allowed by CloudFormation but documented for research
  # DynamoDB always encrypts at rest, this represents using default key
  DisabledEncryptionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: "disabled-encryption-table"
      AttributeDefinitions:
        - AttributeName: "userId"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "userId"
          KeyType: "HASH"
      BillingMode: "PAY_PER_REQUEST"
      # MISCONFIGURATION: Using default AWS owned key (no customer KMS)
      # This is the default behavior when SSESpecification is not provided
      Tags:
        - Key: Misconfiguration
          Value: "DynamoDB-Default-Key"
        - Key: Note
          Value: "DynamoDB always encrypts at rest, but uses AWS owned key"

  # MISCONFIGURATION 3: Table with explicit default encryption (same as no specification)
  DefaultEncryptionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: "default-encryption-table"
      AttributeDefinitions:
        - AttributeName: "recordId"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "recordId"
          KeyType: "HASH"
      BillingMode: "PAY_PER_REQUEST"
      # SSESpecification can be added but without KmsMasterKeyId uses AWS owned key
      SSESpecification:
        SSEEnabled: true
        # MISCONFIGURATION: No KmsMasterKeyId specified
        # Uses AWS owned key instead of customer managed key
      Tags:
        - Key: Misconfiguration
          Value: "DynamoDB-No-Customer-KMS"

  # Example of CORRECT configuration with customer managed KMS (commented)
  # CustomerManagedKMSKey:
  #   Type: AWS::KMS::Key
  #   Properties:
  #     Description: "Customer managed key for DynamoDB"
  #     Enabled: true
  #     KeyPolicy:
  #       Version: "2012-10-17"
  #       Statement:
  #         - Effect: Allow
  #           Principal:
  #             AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
  #           Action: "kms:*"
  #           Resource: "*"
  #
  # EncryptedDynamoDBTable:
  #   Type: AWS::DynamoDB::Table
  #   Properties:
  #     TableName: "encrypted-dynamodb-table"
  #     AttributeDefinitions:
  #       - AttributeName: "id"
  #         AttributeType: "S"
  #     KeySchema:
  #       - AttributeName: "id"
  #         KeyType: "HASH"
  #     BillingMode: "PAY_PER_REQUEST"
  #     SSESpecification:
  #       SSEEnabled: true
  #       KMSMasterKeyId: !GetAtt CustomerManagedKMSKey.Arn

  # Sample items to demonstrate data at rest
  SampleItems:
    Type: Custom::DynamoDBItems
    Properties:
      ServiceToken: !GetAtt ItemFunction.Arn
      TableName: !Ref UnencryptedDynamoDBTable

  # Lambda to insert sample items
  ItemFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          
          def handler(event, context):
              try:
                  if event['RequestType'] == 'Create':
                      dynamodb = boto3.resource('dynamodb')
                      table = dynamodb.Table(event['ResourceProperties']['TableName'])
                      
                      # Insert sample data
                      table.put_item(Item={'id': 'user123', 'name': 'John Doe', 'email': 'john@example.com'})
                      table.put_item(Item={'id': 'user456', 'name': 'Jane Smith', 'email': 'jane@example.com'})
                      table.put_item(Item={'id': 'admin', 'name': 'Admin User', 'email': 'admin@example.com'})
                      
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  else:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBWritePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${UnencryptedDynamoDBTable}"

Outputs:
  TableName:
    Description: "DynamoDB table with default encryption"
    Value: !Ref UnencryptedDynamoDBTable
  TableArn:
    Description: "ARN of DynamoDB table"
    Value: !GetAtt UnencryptedDynamoDBTable.Arn
  RiskDescription:
    Description: "Why this is a concern"
    Value: |
      DynamoDB tables are ALWAYS encrypted at rest by default.
      However, the misconfiguration is using AWS OWNED KEY instead of CUSTOMER MANAGED KMS KEY.
      
      With AWS owned key:
      - You cannot control key rotation schedule
      - You cannot audit key usage in CloudTrail
      - You cannot disable or delete the key
      - You cannot set key policies
      - Compliance auditors may not accept this for sensitive data
      
      With Customer Managed KMS Key:
      - Full control over key rotation
      - Complete audit trail of key usage
      - Ability to disable/delete key
      - Custom key policies for access control
  DifferenceFromOtherFiles:
    Description: "How this differs from S3/EBS/RDS encryption"
    Value: |
      S3/EBS/RDS: Can have NO encryption (data plaintext)
      DynamoDB: ALWAYS has encryption (data always ciphertext)
      
      The misconfiguration is about WHO controls the encryption key:
      - AWS owned key (default, less control) = MISCONFIGURATION
      - Customer managed KMS key (full control) = SECURE
  AttackScenario:
    Description: "Limitations of AWS owned key"
    Value: |
      1. Security auditor requests evidence of key management
      2. You cannot provide key rotation schedule (AWS controls it)
      3. You cannot provide key usage audit logs (not in your CloudTrail)
      4. Compliance audit FAILS for sensitive data
      5. Customer data cannot be stored in this table per compliance requirements
  RemediationCommand:
    Description: "Fix: Enable customer managed KMS key"
    Value: |
      # Step 1: Create customer managed KMS key
      aws kms create-key --description "DynamoDB encryption key" --key-usage ENCRYPT_DECRYPT
      
      # Step 2: Create alias for the key
      aws kms create-alias --alias-name alias/dynamodb-encryption-key --target-key-id <KEY_ID>
      
      # Step 3: Create new table with customer managed KMS key
      # Note: Cannot change encryption key on existing table - must create new table and migrate data
      
      # Step 4: Enable point-in-time recovery on new table
      aws dynamodb update-continuous-backups --table-name <NEW_TABLE> --point-in-time-recovery-specification PointInTimeRecoveryEnabled=true
      
      # Step 5: Migrate data from old table to new table
      # Step 6: Update application to use new table
      # Step 7: Delete old table
  ComplianceNote:
    Description: "Compliance frameworks requiring customer managed keys"
    Value: "PCI DSS, HIPAA, FedRAMP, and many others require customer managed keys for sensitive data"
