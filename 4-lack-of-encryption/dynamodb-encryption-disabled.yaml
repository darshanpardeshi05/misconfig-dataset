AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - DynamoDB table using default AWS owned key (not customer managed KMS)

Metadata:
  Misconfiguration:
    Category: "Lack of Encryption"
    Severity: "MEDIUM"
    RuleId: "DYNAMODB-001"
    Description: "DynamoDB table uses default AWS owned encryption key instead of customer managed KMS key. While data is encrypted, customer lacks control over key rotation and audit capabilities."
    Remediation: "Enable server-side encryption with customer managed KMS key for better security and compliance"
    Keywords:
      - "SSESpecification"
      - "KMSMasterKeyId"
      - "AWS owned key"
      - "default encryption"
      - "SSEEnabled"
    ML_Label: "misconfiguration"

Resources:
  UnencryptedDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "unencrypted-dynamodb-${AWS::StackName}"
      AttributeDefinitions:
        - AttributeName: "id"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "id"
          KeyType: "HASH"
      BillingMode: "PAY_PER_REQUEST"
      # MISCONFIGURATION: No SSESpecification with KmsMasterKeyId
      # Uses default AWS owned key (less control)
      Tags:
        - Key: Name
          Value: "Unencrypted-DynamoDB-Table"
        - Key: Misconfiguration
          Value: "DYNAMODB-001"
        - Key: Category
          Value: "Lack-of-Encryption"
        - Key: Severity
          Value: "MEDIUM"
        - Key: Batch
          Value: "Batch-7"

Outputs:
  TableName:
    Description: "DynamoDB table with default encryption (AWS owned key)"
    Value: !Ref UnencryptedDynamoDBTable
  Risk:
    Description: "Security Risk"
    Value: "Table uses AWS owned key. No control over key rotation, no audit of key usage, compliance may fail for sensitive data."
  RemediationCommand:
    Description: "Fix: Create new table with customer managed KMS key and migrate data"
    Value: |
      aws kms create-key --description "DynamoDB customer managed key"
      aws dynamodb create-table --table-name encrypted-table --attribute-definitions AttributeName=id,AttributeType=S --key-schema AttributeName=id,KeyType=HASH --billing-mode PAY_PER_REQUEST --sse-specification Enabled=true,SSEType=KMS,KMSMasterKeyId=<CUSTOM_KEY_ARN>
      # Migrate data from old table to new table
