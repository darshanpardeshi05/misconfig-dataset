AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - RDS instance with encryption disabled (data at rest not encrypted)

Metadata:
  Misconfiguration:
    Category: "Lack of Encryption"
    Severity: "HIGH"
    RuleId: "RDS-003"
    Description: "RDS database instance has encryption disabled. All database data, backups, read replicas, and snapshots are stored unencrypted at rest."
    Remediation: "Enable encryption when creating RDS instances. Note: Encryption cannot be enabled on existing unencrypted RDS instances without migration."
    Keywords:
      - "StorageEncrypted: false"
      - "RDS encryption"
      - "database encryption"
      - "KmsKeyId"
    ML_Label: "misconfiguration"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.11.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "RDS-Encryption-VPC"
        - Key: Batch
          Value: "Batch-7"

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.11.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: "RDS-Private-Subnet-1"
        - Key: Batch
          Value: "Batch-7"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.12.0/24"
      AvailabilityZone: !Sub "${AWS::Region}b"
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: "RDS-Private-Subnet-2"
        - Key: Batch
          Value: "Batch-7"

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Private subnets for RDS"
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: "RDS-Subnet-Group"
        - Key: Batch
          Value: "Batch-7"

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "RDS database security group"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: "10.0.0.0/16"
      Tags:
        - Key: Name
          Value: "RDS-SG"
        - Key: Batch
          Value: "Batch-7"

  # MISCONFIGURATION: StorageEncrypted explicitly set to false
  UnencryptedMySQLDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "unencrypted-mysql-db-${AWS::StackName}"
      DBInstanceClass: db.t3.micro
      Engine: mysql
      EngineVersion: "8.0"
      MasterUsername: "admin"
      MasterUserPassword: "SecurePassword123!"
      AllocatedStorage: 20
      StorageEncrypted: false
      StorageType: gp3
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      BackupRetentionPeriod: 7
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: "Unencrypted-MySQL-DB"
        - Key: Misconfiguration
          Value: "RDS-003"
        - Key: Category
          Value: "Lack-of-Encryption"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-7"

Outputs:
  DatabaseEndpoint:
    Description: "Unencrypted MySQL database endpoint"
    Value: !GetAtt UnencryptedMySQLDatabase.Endpoint.Address
  Risk:
    Description: "Security Risk"
    Value: "All data in this RDS instance is stored unencrypted at rest. Backups and snapshots are also unencrypted."
  RemediationCommand:
    Description: "Fix: Create new encrypted RDS and migrate data"
    Value: |
      # Create snapshot, copy with encryption, restore new encrypted instance
      aws rds create-db-snapshot --db-instance-identifier <DB_ID> --db-snapshot-identifier pre-migration-snapshot
      aws rds copy-db-snapshot --source-db-snapshot-identifier pre-migration-snapshot --target-db-snapshot-identifier encrypted-snapshot --encrypted
      aws rds restore-db-instance-from-db-snapshot --db-instance-identifier encrypted-db --db-snapshot-identifier encrypted-snapshot
