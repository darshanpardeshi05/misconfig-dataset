AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - RDS instance with encryption disabled (data at rest not encrypted)

Metadata:
  Misconfiguration:
    Category: "Lack of Encryption"
    Severity: "HIGH"
    RuleId: "RDS-003"
    Description: "RDS database instance has encryption disabled. All database data, backups, read replicas, and snapshots are stored unencrypted at rest."
    Remediation: "Enable encryption when creating RDS instances. Note: Encryption cannot be enabled on existing unencrypted RDS instances without migration."
    # KEYWORDS FOR KEYWORD-BASED DETECTION
    Keywords:
      - "StorageEncrypted: false"
      - "StorageEncrypted: false"
      - "RDS encryption"
      - "database encryption"
      - "KmsKeyId"
    # LABEL FOR ML-BASED DETECTION
    ML_Label: "misconfiguration"

Resources:
  # MISCONFIGURATION START: RDS instance with encryption disabled
  
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "RDS-Encryption-VPC"

  # Database subnet group (private subnets)
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Private subnets for RDS"
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: "Private-Subnet-1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.2.0/24"
      AvailabilityZone: !Sub "${AWS::Region}b"
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: "Private-Subnet-2"

  # Security group for RDS
  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "RDS database security group"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: "10.0.0.0/16"
      Tags:
        - Key: Name
          Value: "RDS-SG"

  # MISCONFIGURATION 1: MySQL RDS instance with encryption disabled
  UnencryptedMySQLDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: "unencrypted-mysql-db"
      DBInstanceClass: db.t3.micro
      Engine: mysql
      EngineVersion: "8.0"
      MasterUsername: "admin"
      MasterUserPassword: "SecurePassword123!"
      AllocatedStorage: 20
      # MISCONFIGURATION: StorageEncrypted is false (or omitted, which defaults to false)
      StorageEncrypted: false
      StorageType: gp3
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      BackupRetentionPeriod: 7
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: "Unencrypted-MySQL-DB"
        - Key: Misconfiguration
          Value: "RDS-Encryption-Disabled"

  # MISCONFIGURATION 2: PostgreSQL RDS instance with encryption disabled
  UnencryptedPostgresDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: "unencrypted-postgres-db"
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: "15"
      MasterUsername: "postgres"
      MasterUserPassword: "SecurePassword123!"
      AllocatedStorage: 20
      # MISCONFIGURATION: StorageEncrypted explicitly set to false
      StorageEncrypted: false
      StorageType: gp3
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      BackupRetentionPeriod: 7
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: "Unencrypted-PostgreSQL-DB"
        - Key: Misconfiguration
          Value: "RDS-Encryption-Disabled"

  # MISCONFIGURATION 3: Aurora cluster with encryption disabled
  UnencryptedAuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      DBClusterIdentifier: "unencrypted-aurora-cluster"
      Engine: aurora-mysql
      EngineVersion: "5.7.mysql_aurora.2.11.1"
      MasterUsername: "admin"
      MasterUserPassword: "SecurePassword123!"
      # MISCONFIGURATION: StorageEncrypted is false
      StorageEncrypted: false
      Port: 3306
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DatabaseSecurityGroup
      Tags:
        - Key: Name
          Value: "Unencrypted-Aurora-Cluster"
        - Key: Misconfiguration
          Value: "RDS-Encryption-Disabled"

  # Aurora DB instance (reader/writer)
  UnencryptedAuroraInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: "unencrypted-aurora-instance"
      DBInstanceClass: db.t3.small
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref UnencryptedAuroraCluster
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: "Unencrypted-Aurora-Instance"
        - Key: Misconfiguration
          Value: "RDS-Encryption-Disabled"

  # Example of what CORRECT encryption would look like (commented)
  # EncryptedDatabase:
  #   Type: AWS::RDS::DBInstance
  #   Properties:
  #     DBInstanceIdentifier: "encrypted-db"
  #     StorageEncrypted: true
  #     KmsKeyId: "arn:aws:kms:us-east-1:123456789012:key/xxxxx"
  #     ... other properties

Outputs:
  MySQLDatabaseEndpoint:
    Description: "Unencrypted MySQL database endpoint"
    Value: !GetAtt UnencryptedMySQLDatabase.Endpoint.Address
  PostgresDatabaseEndpoint:
    Description: "Unencrypted PostgreSQL database endpoint"
    Value: !GetAtt UnencryptedPostgresDatabase.Endpoint.Address
  AuroraClusterEndpoint:
    Description: "Unencrypted Aurora cluster endpoint"
    Value: !GetAtt UnencryptedAuroraCluster.Endpoint.Address
  RiskDescription:
    Description: "Why this is dangerous"
    Value: |
      Data in this RDS instance is stored UNENCRYPTED at rest:
      - All customer data (PII, financial records, credentials)
      - All application data
      - Automated backups are also unencrypted
      - Read replicas are unencrypted
      - Snapshots are unencrypted
      
      If someone gains access to the underlying storage or backups, all data is readable.
  AttackScenario:
    Description: "How data can be exposed"
    Value: |
      1. Attacker gains access to AWS account (via compromised keys)
      2. Attacker creates snapshot of unencrypted RDS instance
      3. Attacker restores snapshot to new RDS instance
      4. Attacker connects to restored instance
      5. Attacker runs: SELECT * FROM users;
      6. MILLIONS of customer records stolen in minutes
      7. Data appears on dark web, company faces lawsuits
  ImportantNote:
    Description: "CRITICAL: Encryption cannot be enabled on existing unencrypted RDS"
    Value: |
      Once an RDS instance is created without encryption, you CANNOT enable encryption on it.
      The ONLY way to encrypt the data is:
      1. Create a new encrypted RDS instance
      2. Migrate all data from old to new
      3. Update application connection strings
      4. Delete old unencrypted instance
  RemediationCommand:
    Description: "Fix: Create new encrypted RDS and migrate data"
    Value: |
      # Step 1: Create snapshot of current database
      aws rds create-db-snapshot --db-instance-identifier unencrypted-mysql-db --db-snapshot-identifier pre-migration-snapshot
      
      # Step 2: Copy snapshot with encryption enabled
      aws rds copy-db-snapshot --source-db-snapshot-identifier pre-migration-snapshot --target-db-snapshot-identifier encrypted-snapshot --copy-tags --encrypted
      
      # Step 3: Restore encrypted database from encrypted snapshot
      aws rds restore-db-instance-from-db-snapshot --db-instance-identifier encrypted-mysql-db --db-snapshot-identifier encrypted-snapshot
      
      # Step 4: Migrate data and update application
      # Step 5: Delete old unencrypted instance
  ComplianceViolation:
    Description: "Compliance frameworks requiring RDS encryption"
    Value: "PCI DSS (Requirement 3.4), HIPAA (164.312(a)(2)(iv)), GDPR (Article 32), SOC 2 (CC6.1), FedRAMP"
