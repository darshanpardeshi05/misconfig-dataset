AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - Lambda environment variables without customer managed KMS encryption (using default AWS managed key)

Metadata:
  Misconfiguration:
    Category: "Lack of Encryption"
    Severity: "HIGH"
    RuleId: "LAMBDA-001"
    Description: "Lambda function environment variables are not encrypted with a customer managed KMS key. While AWS encrypts them by default, using default key means less control and potential exposure of sensitive data (API keys, database passwords) in plaintext in Lambda console/API."
    Remediation: "Enable encryption with customer managed KMS key for Lambda environment variables"
    Keywords:
      - "KmsKeyArn"
      - "Environment"
      - "Variables"
      - "kms:Encrypt"
      - "kms:Decrypt"
      - "default AWS managed key"
    ML_Label: "misconfiguration"

Resources:
  LambdaWithPlaintextEnvVars:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "lambda-plaintext-env-${AWS::StackName}"
      Handler: "index.handler"
      Runtime: "python3.9"
      Role: !GetAtt LambdaExecutionRole.Arn
      # MISCONFIGURATION: No KmsKeyArn specified
      # Environment variables use default AWS managed key
      Environment:
        Variables:
          DATABASE_PASSWORD: "MySecretPassword123"
          API_KEY: "sk-live-abc123xyz789"
          JWT_SECRET: "super-secret-jwt-key-2024"
      Code:
        ZipFile: |
          import os
          def handler(event, context):
              db_password = os.environ.get('DATABASE_PASSWORD')
              api_key = os.environ.get('API_KEY')
              print(f"Database password: {db_password}")
              print(f"API key: {api_key}")
              return {"statusCode": 200, "body": "Function executed"}
      Tags:
        - Key: Name
          Value: "Lambda-Plaintext-Env"
        - Key: Misconfiguration
          Value: "LAMBDA-001"
        - Key: Category
          Value: "Lack-of-Encryption"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-7"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - Key: Name
          Value: "Lambda-Execution-Role"
        - Key: Batch
          Value: "Batch-7"

Outputs:
  LambdaFunctionName:
    Description: "Lambda function with unencrypted environment variables"
    Value: !Ref LambdaWithPlaintextEnvVars
  Risk:
    Description: "Security Risk"
    Value: "Sensitive data (database password, API key, JWT secret) appears in plaintext in Lambda console/API. Anyone with Lambda read permissions can view them."
  RemediationCommand:
    Description: "Fix: Create customer managed KMS key and update Lambda configuration"
    Value: |
      aws kms create-key --description "Lambda env vars encryption key"
      aws kms create-alias --alias-name alias/lambda-env-encryption --target-key-id <KEY_ID>
      aws lambda update-function-configuration --function-name <FUNCTION_NAME> --kms-key-arn arn:aws:kms:<REGION>:<ACCOUNT_ID>:key/<KEY_ID>
