AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - S3 bucket with default encryption disabled

Metadata:
  Misconfiguration:
    Category: "Lack of Encryption"
    Severity: "MEDIUM"
    RuleId: "S3-006"
    Description: "S3 bucket does not have default encryption enabled. Data uploaded to this bucket will be stored unencrypted at rest."
    Remediation: "Enable default encryption on S3 bucket using SSE-S3 or SSE-KMS"
    Keywords:
      - "BucketEncryption"
      - "SSE-S3"
      - "encryption disabled"
      - "no encryption"
      - "ServerSideEncryptionConfiguration"
    ML_Label: "misconfiguration"

Resources:
  UnencryptedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "unencrypted-bucket-${AWS::AccountId}-${AWS::StackName}"
      # MISCONFIGURATION: No BucketEncryption property specified
      # Default encryption is DISABLED by AWS when not specified
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: "Unencrypted-S3-Bucket"
        - Key: Misconfiguration
          Value: "S3-006"
        - Key: Category
          Value: "Lack-of-Encryption"
        - Key: Severity
          Value: "MEDIUM"
        - Key: Batch
          Value: "Batch-7"

Outputs:
  BucketName:
    Description: "S3 bucket with encryption disabled"
    Value: !Ref UnencryptedBucket
  Risk:
    Description: "Security Risk"
    Value: "Data stored in this bucket is NOT encrypted at rest. Compliance violations (PCI DSS, HIPAA, GDPR) and data breach risk."
  RemediationCommand:
    Description: "Fix: Enable default encryption"
    Value: !Sub "aws s3api put-bucket-encryption --bucket ${UnencryptedBucket} --server-side-encryption-configuration '{\"Rules\":[{\"ApplyServerSideEncryptionByDefault\":{\"SSEAlgorithm\":\"AES256\"}}]}'"
