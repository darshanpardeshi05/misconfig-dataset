AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - Redshift cluster with encryption disabled (data at rest not encrypted)

Metadata:
  Misconfiguration:
    Category: "Lack of Encryption"
    Severity: "HIGH"
    RuleId: "REDSHIFT-001"
    Description: "Redshift cluster has encryption at rest disabled. All data in the data warehouse (customer data, financial records, analytics) is stored unencrypted."
    Remediation: "Enable encryption when creating Redshift clusters. Note: Encryption cannot be enabled on existing clusters without data migration."
    Keywords:
      - "Encrypted: false"
      - "Redshift encryption"
      - "KmsKeyId"
      - "StorageEncrypted"
    ML_Label: "misconfiguration"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.14.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "Redshift-Encryption-VPC"
        - Key: Batch
          Value: "Batch-8"

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.14.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: "Redshift-Private-Subnet-1"
        - Key: Batch
          Value: "Batch-8"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.15.0/24"
      AvailabilityZone: !Sub "${AWS::Region}b"
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: "Redshift-Private-Subnet-2"
        - Key: Batch
          Value: "Batch-8"

  RedshiftSubnetGroup:
    Type: AWS::Redshift::ClusterSubnetGroup
    Properties:
      Description: "Redshift subnet group"
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: "Redshift-Subnet-Group"
        - Key: Batch
          Value: "Batch-8"

  RedshiftSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Redshift security group"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5439
          ToPort: 5439
          CidrIp: "10.0.0.0/16"
      Tags:
        - Key: Name
          Value: "Redshift-SG"
        - Key: Batch
          Value: "Batch-8"

  # MISCONFIGURATION: Encrypted property omitted (defaults to false)
  UnencryptedRedshiftCluster:
    Type: AWS::Redshift::Cluster
    Properties:
      ClusterIdentifier: !Sub "unencrypted-redshift-${AWS::StackName}"
      DBName: "datawarehouse"
      MasterUsername: "admin"
      MasterUserPassword: "SecurePassword123!"
      NodeType: "dc2.large"
      ClusterType: "single-node"
      # MISCONFIGURATION: No Encrypted: true (defaults to false)
      VpcSecurityGroupIds:
        - !Ref RedshiftSecurityGroup
      ClusterSubnetGroupName: !Ref RedshiftSubnetGroup
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: "Unencrypted-Redshift-Cluster"
        - Key: Misconfiguration
          Value: "REDSHIFT-001"
        - Key: Category
          Value: "Lack-of-Encryption"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-8"

Outputs:
  ClusterIdentifier:
    Description: "Redshift cluster with encryption disabled"
    Value: !Ref UnencryptedRedshiftCluster
  Risk:
    Description: "Security Risk"
    Value: "All data in Redshift (customer PII, financial records, analytics) is stored unencrypted at rest. Backups and snapshots also unencrypted. Compliance violation for PCI DSS, HIPAA."
  RemediationCommand:
    Description: "Fix: Create new encrypted Redshift cluster and migrate data"
    Value: |
      aws redshift create-cluster --cluster-identifier encrypted-redshift --db-name datawarehouse --master-username admin --master-user-password NewSecurePassword --node-type dc2.large --cluster-type single-node --encrypted --kms-key-id alias/aws/redshift
      # Unload data from old cluster to S3, then COPY into new encrypted cluster
      # Update applications, then delete old cluster
