AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - EFS file system with encryption at rest disabled

Metadata:
  Misconfiguration:
    Category: "Lack of Encryption"
    Severity: "HIGH"
    RuleId: "EFS-002"
    Description: "EFS file system has encryption at rest disabled. All data stored on this file system (application files, logs, databases, backups) is stored unencrypted."
    Remediation: "Enable encryption at rest when creating EFS file systems. Note: Cannot be enabled on existing file systems without data migration."
    Keywords:
      - "Encrypted: false"
      - "EFS encryption"
      - "KmsKeyId"
      - "FileSystem"
    ML_Label: "misconfiguration"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.13.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "EFS-Encryption-VPC"
        - Key: Batch
          Value: "Batch-8"

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.13.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "EFS-Public-Subnet"
        - Key: Batch
          Value: "Batch-8"

  UnencryptedEFS:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: false
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      Tags:
        - Key: Name
          Value: "Unencrypted-EFS"
        - Key: Misconfiguration
          Value: "EFS-002"
        - Key: Category
          Value: "Lack-of-Encryption"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-8"

  EFSMountSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "EFS mount security group"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: "10.0.0.0/16"
      Tags:
        - Key: Name
          Value: "EFS-SG"
        - Key: Batch
          Value: "Batch-8"

  EFSMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref UnencryptedEFS
      SubnetId: !Ref PublicSubnet
      SecurityGroups:
        - !Ref EFSMountSecurityGroup

Outputs:
  FileSystemId:
    Description: "EFS file system with encryption disabled"
    Value: !Ref UnencryptedEFS
  Risk:
    Description: "Security Risk"
    Value: "Data on unencrypted EFS is stored as plaintext. Snapshots are also unencrypted. Compliance violation for PCI DSS, HIPAA."
  RemediationCommand:
    Description: "Fix: Create new encrypted EFS and migrate data"
    Value: |
      aws efs create-file-system --encrypted --kms-key-id alias/aws/efs
      aws efs create-mount-target --file-system-id <NEW_FS_ID> --subnet-id <SUBNET_ID> --security-groups <SG_ID>
      # Copy data using rsync or AWS DataSync, then update application mount points
