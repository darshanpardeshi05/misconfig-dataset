AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - S3 bucket allowing PUT requests without encryption headers (SSE not enforced)

Metadata:
  Misconfiguration:
    Category: "Lack of Encryption"
    Severity: "MEDIUM"
    RuleId: "S3-007"
    Description: "S3 bucket does not enforce encryption for uploaded objects. Clients can upload unencrypted objects without any encryption headers."
    Remediation: "Add bucket policy that denies PutObject requests without x-amz-server-side-encryption header"
    Keywords:
      - "PutObject"
      - "x-amz-server-side-encryption"
      - "s3:x-amz-server-side-encryption"
      - "SSE-S3"
      - "Deny"
      - "encryption header"
    ML_Label: "misconfiguration"

Resources:
  NoSSEEnforcedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "no-sse-enforced-${AWS::AccountId}-${AWS::StackName}"
      # MISCONFIGURATION: No bucket policy to enforce encryption headers
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: "No-SSE-Enforced-Bucket"
        - Key: Misconfiguration
          Value: "S3-007"
        - Key: Category
          Value: "Lack-of-Encryption"
        - Key: Severity
          Value: "MEDIUM"
        - Key: Batch
          Value: "Batch-7"

  # =========================================================
  # MISSING POLICY: The following policy is NOT applied.
  # Its absence is the misconfiguration.
  # =========================================================
  # EnforceSSEPolicy:
  #   Type: AWS::S3::BucketPolicy
  #   Properties:
  #     Bucket: !Ref NoSSEEnforcedBucket
  #     PolicyDocument:
  #       Version: "2012-10-17"
  #       Statement:
  #         - Effect: "Deny"
  #           Principal: "*"
  #           Action: "s3:PutObject"
  #           Resource: !Sub "arn:aws:s3:::${NoSSEEnforcedBucket}/*"
  #           Condition:
  #             StringNotEquals:
  #               "s3:x-amz-server-side-encryption": "AES256"

Outputs:
  BucketName:
    Description: "S3 bucket that does not enforce encryption headers"
    Value: !Ref NoSSEEnforcedBucket
  Risk:
    Description: "Security Risk"
    Value: "Clients can upload objects without encryption headers, leading to unencrypted data at rest. Compliance violation for PCI DSS, HIPAA."
  RemediationCommand:
    Description: "Fix: Add bucket policy to enforce encryption headers"
    Value: !Sub "aws s3api put-bucket-policy --bucket ${NoSSEEnforcedBucket} --policy '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Deny\",\"Principal\":\"*\",\"Action\":\"s3:PutObject\",\"Resource\":\"arn:aws:s3:::${NoSSEEnforcedBucket}/*\",\"Condition\":{\"StringNotEquals\":{\"s3:x-amz-server-side-encryption\":\"AES256\"}}}]}'"
