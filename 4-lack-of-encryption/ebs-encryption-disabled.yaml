AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - EBS volume with encryption disabled

Metadata:
  Misconfiguration:
    Category: "Lack of Encryption"
    Severity: "HIGH"
    RuleId: "EBS-002"
    Description: "EBS volume has encryption disabled. Any data written to this volume (application data, logs, databases) is stored unencrypted at rest."
    Remediation: "Enable EBS encryption by default at the account level, or specify Encrypted: true for each volume"
    Keywords:
      - "Encrypted: false"
      - "EBS encryption"
      - "Volume encryption"
      - "ebs-encryption-disabled"
    ML_Label: "misconfiguration"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.10.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "EBS-Encryption-VPC"
        - Key: Batch
          Value: "Batch-7"

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.10.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "EBS-Public-Subnet"
        - Key: Batch
          Value: "Batch-7"

  UnencryptedVolume:
    Type: AWS::EC2::Volume
    Properties:
      Size: 10
      AvailabilityZone: !Sub "${AWS::Region}a"
      Encrypted: false
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: "Unencrypted-EBS-Volume"
        - Key: Misconfiguration
          Value: "EBS-002"
        - Key: Category
          Value: "Lack-of-Encryption"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-7"

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !FindInMap [AWSRegionArch2AMI, !Ref "AWS::Region", AMI]
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: "EBS-Encryption-Test-Instance"
        - Key: Batch
          Value: "Batch-7"

  VolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      InstanceId: !Ref EC2Instance
      VolumeId: !Ref UnencryptedVolume
      Device: /dev/sdf

Mappings:
  AWSRegionArch2AMI:
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    us-west-2:
      AMI: ami-0d70546e43a328d54
    eu-west-1:
      AMI: ami-07470b0ad10cbe60e

Outputs:
  VolumeId:
    Description: "Unencrypted EBS volume ID"
    Value: !Ref UnencryptedVolume
  Risk:
    Description: "Security Risk"
    Value: "Data on unencrypted EBS volume is stored as plaintext. If snapshot or disk is accessed, all data is readable."
  RemediationCommand:
    Description: "Fix: Enable encryption for new volumes and migrate existing data"
    Value: |
      aws ec2 enable-ebs-encryption-by-default
      # For existing unencrypted volume, create encrypted snapshot, then new encrypted volume
