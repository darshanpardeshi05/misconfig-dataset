AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - SNS topic with encryption disabled (data at rest not encrypted)

Metadata:
  Misconfiguration:
    Category: "Lack of Encryption"
    Severity: "MEDIUM"
    RuleId: "SNS-001"
    Description: "SNS topic does not have server-side encryption enabled. Messages published to this topic are stored unencrypted at rest."
    Remediation: "Enable SSE-SNS encryption using AWS managed KMS key or customer managed key"
    Keywords:
      - "KmsMasterKeyId"
      - "TopicEncryption"
      - "sns:Encrypt"
      - "sns:Decrypt"
    ML_Label: "misconfiguration"

Resources:
  UnencryptedSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "unencrypted-sns-${AWS::StackName}"
      # MISCONFIGURATION: No KmsMasterKeyId property specified
      # SSE is disabled by default for SNS
      DisplayName: "Unencrypted SNS Topic"
      Tags:
        - Key: Name
          Value: "Unencrypted-SNS-Topic"
        - Key: Misconfiguration
          Value: "SNS-001"
        - Key: Category
          Value: "Lack-of-Encryption"
        - Key: Severity
          Value: "MEDIUM"
        - Key: Batch
          Value: "Batch-7"

Outputs:
  TopicName:
    Description: "SNS topic with encryption disabled"
    Value: !Ref UnencryptedSNSTopic
  TopicArn:
    Description: "ARN of unencrypted SNS topic"
    Value: !Ref UnencryptedSNSTopic
  Risk:
    Description: "Security Risk"
    Value: "Messages are stored unencrypted at rest. Sensitive data (PII, credentials, financial info) exposed if storage accessed."
  RemediationCommand:
    Description: "Fix: Enable SSE on SNS topic"
    Value: !Sub "aws sns set-topic-attributes --topic-arn ${UnencryptedSNSTopic} --attribute-name KmsMasterKeyId --attribute-value alias/aws/sns"
