AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - SQS queue with SSE disabled (no server-side encryption)

Metadata:
  Misconfiguration:
    Category: "Lack of Encryption"
    Severity: "MEDIUM"
    RuleId: "SQS-001"
    Description: "SQS queue does not have server-side encryption enabled. Messages are stored unencrypted at rest, potentially exposing sensitive data."
    Remediation: "Enable SSE-SQS encryption using AWS managed KMS key or customer managed key"
    Keywords:
      - "KmsMasterKeyId"
      - "SqsManagedSseEnabled"
      - "SSE"
      - "encryption"
      - "sqs"
    ML_Label: "misconfiguration"

Resources:
  UnencryptedSQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "unencrypted-sqs-${AWS::StackName}"
      # MISCONFIGURATION: No KmsMasterKeyId property specified
      # SSE is disabled by default
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600
      DelaySeconds: 0
      ReceiveMessageWaitTimeSeconds: 0
      Tags:
        - Key: Name
          Value: "Unencrypted-SQS-Queue"
        - Key: Misconfiguration
          Value: "SQS-001"
        - Key: Category
          Value: "Lack-of-Encryption"
        - Key: Severity
          Value: "MEDIUM"
        - Key: Batch
          Value: "Batch-7"

Outputs:
  QueueName:
    Description: "SQS queue with SSE disabled"
    Value: !Ref UnencryptedSQSQueue
  QueueArn:
    Description: "ARN of unencrypted SQS queue"
    Value: !GetAtt UnencryptedSQSQueue.Arn
  Risk:
    Description: "Security Risk"
    Value: "Messages are stored unencrypted at rest. Sensitive data (PII, credentials) is exposed to anyone with disk access or the sqs:ReceiveMessage permission."
  RemediationCommand:
    Description: "Fix: Enable SSE using AWS managed SQS KMS key"
    Value: !Sub "aws sqs set-queue-attributes --queue-url https://sqs.${AWS::Region}.amazonaws.com/${AWS::AccountId}/${UnencryptedSQSQueue} --attributes '{\"KmsMasterKeyId\":\"alias/aws/sqs\"}'"
