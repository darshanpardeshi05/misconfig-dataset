AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - EBS snapshot shared publicly (Fixed for gp3)

Metadata:
  Misconfiguration:
    Category: "Storage-Exposure"
    Severity: "CRITICAL"
    RuleId: "EBS-001"
    Description: "EBS snapshot is shared publicly"
    Remediation: "Modify snapshot permissions to private"
    Keywords:
      - "EBS snapshot public"
      - "createVolumePermission all"
    ML_Label: "misconfiguration"

Resources:
  # 1. Create a simple gp3 volume (1GB is well within free tier)
  SourceVolume:
    Type: AWS::EC2::Volume
    Properties:
      Size: 1
      VolumeType: gp3
      AvailabilityZone: us-east-1b
      Encrypted: false
      Tags:
        - Key: Name
          Value: "EBS-Source-Volume"

  # 2. Create snapshot from that volume
  PublicSnapshot:
    Type: AWS::EC2::Snapshot
    Properties:
      Description: "MISCONFIGURATION - Publicly shared EBS snapshot"
      VolumeId: !Ref SourceVolume
      Tags:
        - Key: Name
          Value: "EBS-Public-Snapshot"

Outputs:
  SnapshotId:
    Description: "Publicly shared snapshot ID"
    Value: !Ref PublicSnapshot

  FixCommand:
    Description: "Command to make snapshot private"
    Value: !Sub "aws ec2 modify-snapshot-attribute --snapshot-id ${PublicSnapshot} --attribute createVolumePermission --operation-type remove --group-names all"
