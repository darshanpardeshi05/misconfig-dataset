AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - S3 bucket with bucket policy allowing public access via Principal: "*"

# METADATA - For research tracking and automated detection
Metadata:
  Misconfiguration:
    Category: "Storage-Exposure"
    Severity: "CRITICAL"
    RuleId: "S3-004"
    Description: "S3 bucket policy uses Principal '*' which grants access to anyone on the internet"
    Remediation: "Remove public policy and restrict access to specific IAM principals"
    Keywords:
      - "Principal *"
      - "S3 public policy"
      - "bucket policy public"
      - "s3:GetObject public"
      - "BlockPublicPolicy false"
    ML_Label: "misconfiguration"

Resources:

  PublicPolicyBucket:
    Type: AWS::S3::Bucket
    Properties:

      # Unique bucket name
      BucketName: !Sub "s3-policy-public-${AWS::AccountId}-${AWS::StackName}"

      # MISCONFIGURATION: Allow public policies
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

      Tags:
        - Key: Name
          Value: "S3-Public-Policy-Bucket"
        - Key: Misconfiguration
          Value: "S3-004"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-1"

  PublicBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PublicPolicyBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"

            # MISCONFIGURATION: Public access
            Principal: "*"

            Action:
              - "s3:GetObject"
              - "s3:ListBucket"

            Resource:
              - !Sub "arn:aws:s3:::${PublicPolicyBucket}"
              - !Sub "arn:aws:s3:::${PublicPolicyBucket}/*"

Outputs:
  BucketName:
    Description: "Publicly accessible bucket"
    Value: !Ref PublicPolicyBucket

  PublicURL:
    Description: "Public access URL"
    Value: !Sub "https://${PublicPolicyBucket}.s3.${AWS::Region}.amazonaws.com/"

  TestCommand:
    Description: "Test public access"
    Value: !Sub "curl https://${PublicPolicyBucket}.s3.${AWS::Region}.amazonaws.com/"

  Risk:
    Description: "Security Risk"
    Value: "Bucket policy allows unrestricted public access to objects."

  FixCommand:
    Description: "Remediation Command"
    Value: !Sub "aws s3api delete-bucket-policy --bucket ${PublicPolicyBucket}"
