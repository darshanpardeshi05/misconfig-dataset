AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - RDS snapshot shared publicly with all AWS accounts

# METADATA - For research tracking and automated detection
Metadata:
  Misconfiguration:
    Category: "Storage-Exposure"
    Severity: "CRITICAL"
    RuleId: "RDS-001"
    Description: "RDS snapshot is shared publicly with all AWS accounts"
    Remediation: "Modify snapshot permissions to private or specific accounts only"
    Keywords:
      - "RDS snapshot public"
      - "modify-db-snapshot-attribute"
      - "restore all"
      - "public database snapshot"
      - "unencrypted RDS"
    ML_Label: "misconfiguration"

Resources:

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "RDS-VPC"
        - Key: Misconfiguration
          Value: "RDS-001"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-1"

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      Tags:
        - Key: Name
          Value: "RDS-Subnet-1"
        - Key: Misconfiguration
          Value: "RDS-001"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-1"

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.2.0/24"
      AvailabilityZone: !Sub "${AWS::Region}b"
      Tags:
        - Key: Name
          Value: "RDS-Subnet-2"
        - Key: Misconfiguration
          Value: "RDS-001"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-1"

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Subnet group for RDS"
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2

  SampleDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "sample-db-${AWS::StackName}"
      AllocatedStorage: 20
      DBInstanceClass: db.t3.micro
      Engine: mysql
      EngineVersion: "8.0"
      MasterUsername: "admin"
      MasterUserPassword: "TempPassword123"
      PubliclyAccessible: false
      StorageEncrypted: false   # MISCONFIGURATION: Not encrypted
      DBSubnetGroupName: !Ref DBSubnetGroup

      Tags:
        - Key: Name
          Value: "RDS-Sample-DB"
        - Key: Misconfiguration
          Value: "RDS-001"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-1"

Outputs:
  DatabaseEndpoint:
    Description: "RDS endpoint (used to create snapshot)"
    Value: !GetAtt SampleDatabase.Endpoint.Address

  SnapshotSteps:
    Description: "Steps to create and expose snapshot"
    Value: |
      1. Create snapshot:
         aws rds create-db-snapshot --db-instance-identifier <DB_ID> --db-snapshot-identifier my-snapshot
      2. Make it public:
         aws rds modify-db-snapshot-attribute --db-snapshot-identifier my-snapshot --attribute-name restore --values-to-add all

  Risk:
    Description: "Security Risk"
    Value: "Public RDS snapshot allows any AWS account to restore the database and access sensitive data."

  FixCommand:
    Description: "Remediation Command"
    Value: |
      aws rds modify-db-snapshot-attribute \
        --db-snapshot-identifier <SNAPSHOT_ID> \
        --attribute-name restore \
        --values-to-remove all
