AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - S3 bucket with PublicReadWrite ACL

# METADATA - For research tracking and automated detection
Metadata:
  Misconfiguration:
    Category: "Storage Exposure"
    Severity: "CRITICAL"
    RuleId: "S3-002"
    Description: "S3 bucket allows public read AND write access via ACL"
    Remediation: "Set AccessControl to Private and enable BlockPublicAccess"

Resources:
  PublicReadWriteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "public-rw-bucket-${AWS::AccountId}"
      
      # MISCONFIGURATION START: PublicReadWrite ACL allows anyone to read AND write objects
      AccessControl: PublicReadWrite
      # MISCONFIGURATION END
      
      # MISCONFIGURATION START: Block Public Access is disabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false      # Should be true
        BlockPublicPolicy: false    # Should be true
        IgnorePublicAcls: false     # Should be true
        RestrictPublicBuckets: false # Should be true
      # MISCONFIGURATION END
