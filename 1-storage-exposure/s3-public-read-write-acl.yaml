AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - S3 bucket with PublicReadWrite ACL

# METADATA - For research tracking and automated detection
Metadata:
  Misconfiguration:
    Category: "Storage-Exposure"
    Severity: "CRITICAL"
    RuleId: "S3-002"
    Description: "S3 bucket allows public read AND write access via ACL"
    Remediation: "Set AccessControl to Private and enable BlockPublicAccess"
    Keywords:
      - "PublicReadWrite"
      - "S3 Public Write"
      - "Public ACL Write"
      - "Anyone can upload"
      - "BlockPublicAccess disabled"
    ML_Label: "misconfiguration"

Resources:
  PublicReadWriteBucket:
    Type: AWS::S3::Bucket
    Properties:

      # Unique bucket name to avoid global conflicts
      BucketName: !Sub "s3-public-rw-${AWS::AccountId}-${AWS::StackName}"

      # MISCONFIGURATION: Public read and write access enabled
      AccessControl: PublicReadWrite

      # MISCONFIGURATION: Block Public Access disabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

      # Tags used for filtering, classification, and mapping
      Tags:
        - Key: Name
          Value: "S3-Public-ReadWrite-Bucket"
        - Key: Misconfiguration
          Value: "S3-002"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-1"

Outputs:
  BucketName:
    Description: "Name of the publicly readable and writable S3 bucket"
    Value: !Ref PublicReadWriteBucket

  Risk:
    Description: "Security Risk"
    Value: "This bucket allows anyone on the internet to read AND upload/modify/delete objects."

  FixCommand:
    Description: "Remediation Command"
    Value: |
      aws s3api put-public-access-block \
        --bucket <BUCKET_NAME> \
        --public-access-block-configuration \
        BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
