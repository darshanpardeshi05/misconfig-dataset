AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - S3 bucket with public read access via bucket policy (updated for modern S3)

Metadata:
  Misconfiguration:
    Category: "Storage-Exposure"
    Severity: "CRITICAL"
    RuleId: "S3-001"
    Description: "S3 bucket allows public read access via bucket policy"
    Remediation: "Remove public bucket policy and enable BlockPublicAccess"
    Keywords:
      - "PublicRead"
      - "S3 Public"
      - "Bucket Policy"
      - "BlockPublicAccess disabled"
      - "s3:GetObject"
    ML_Label: "misconfiguration"

Resources:
  PublicBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "s3-public-read-${AWS::AccountId}-${AWS::StackName}"
      
      # Remove AccessControl - not allowed with BucketOwnerEnforced
      
      # MISCONFIGURATION: Block Public Access disabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred

      Tags:
        - Key: Name
          Value: "S3-Public-Read-Bucket"
        - Key: Misconfiguration
          Value: "S3-001"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-1"

  PublicBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PublicBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "${PublicBucket.Arn}/*"

Outputs:
  BucketName:
    Description: "Name of the publicly accessible S3 bucket"
    Value: !Ref PublicBucket

  Risk:
    Description: "Security Risk"
    Value: "This bucket allows public read access via bucket policy. Anyone on the internet can read all objects."

  FixCommand:
    Description: "Remediation Command"
    Value: !Sub "aws s3api delete-bucket-policy --bucket ${PublicBucket}"
