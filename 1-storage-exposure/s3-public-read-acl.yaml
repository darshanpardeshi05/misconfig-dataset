AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - S3 bucket with PublicRead ACL

# METADATA - For research tracking and automated detection
Metadata:
  Misconfiguration:
    Category: "Storage Exposure"
    Severity: "CRITICAL"
    RuleId: "S3-001"
    Description: "S3 bucket allows public read access via ACL"
    Remediation: "Set AccessControl to Private and enable BlockPublicAccess"

Resources:
  PublicBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "public-bucket-${AWS::AccountId}"
      
      # MISCONFIGURATION START: PublicRead ACL allows anyone to read objects
      AccessControl: PublicRead
      # MISCONFIGURATION END
      
      # MISCONFIGURATION START: Block Public Access is disabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false      # Should be true
        BlockPublicPolicy: false    # Should be true
        IgnorePublicAcls: false     # Should be true
        RestrictPublicBuckets: false # Should be true
      # MISCONFIGURATION END
