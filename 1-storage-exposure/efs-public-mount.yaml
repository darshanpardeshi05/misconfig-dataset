AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - EFS file system with public mount target

# METADATA - For research tracking and automated detection
Metadata:
  Misconfiguration:
    Category: "Storage-Exposure"
    Severity: "HIGH"
    RuleId: "EFS-001"
    Description: "EFS file system has mount target in public subnet with security group allowing NFS from anywhere"
    Remediation: "Move mount target to private subnet and restrict NFS access"
    Keywords:
      - "EFS public"
      - "NFS 2049 open"
      - "mount target public"
      - "0.0.0.0/0"
      - "unencrypted EFS"
    ML_Label: "misconfiguration"

Resources:

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "EFS-VPC"
        - Key: Misconfiguration
          Value: "EFS-001"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-1"

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "EFS-Public-Subnet"
        - Key: Misconfiguration
          Value: "EFS-001"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-1"

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "MISCONFIGURATION - NFS open to world"
      VpcId: !Ref VPC

      # MISCONFIGURATION: NFS open to internet
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIpv6: "::/0"

      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"

      Tags:
        - Key: Name
          Value: "EFS-SG"
        - Key: Misconfiguration
          Value: "EFS-001"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-1"

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: false   # MISCONFIGURATION
      Tags:
        - Key: Name
          Value: "EFS-Public"
        - Key: Misconfiguration
          Value: "EFS-001"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-1"

  EFSMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnet   # MISCONFIGURATION
      SecurityGroups:
        - !Ref EFSSecurityGroup

  TestInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !FindInMap [AWSRegionArch2AMI, !Ref "AWS::Region", AMI]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref EFSSecurityGroup

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum install -y amazon-efs-utils
          mkdir /mnt/efs
          mount -t efs ${EFSFileSystem}:/ /mnt/efs

      Tags:
        - Key: Name
          Value: "EFS-Test-Instance"
        - Key: Misconfiguration
          Value: "EFS-001"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-1"

Mappings:
  AWSRegionArch2AMI:
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    us-west-2:
      AMI: ami-0d70546e43a328d54
    eu-west-1:
      AMI: ami-07470b0ad10cbe60e

Outputs:
  FileSystemId:
    Description: "EFS File System ID"
    Value: !Ref EFSFileSystem

  MountTarget:
    Description: "Public mount target"
    Value: !Ref EFSMountTarget

  Risk:
    Description: "Security Risk"
    Value: "EFS can be accessed from anywhere over NFS, exposing sensitive files."

  FixCommand:
    Description: "Remediation Command"
    Value: |
      aws ec2 revoke-security-group-ingress \
        --group-id <SG_ID> \
        --protocol tcp \
        --port 2049 \
        --cidr 0.0.0.0/0
