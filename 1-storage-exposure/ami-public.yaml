AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - AMI shared publicly with all AWS accounts

# METADATA - For research tracking and automated detection
Metadata:
  Misconfiguration:
    Category: "Storage-Exposure"
    Severity: "CRITICAL"
    RuleId: "AMI-001"
    Description: "AMI is shared publicly with all AWS accounts (anyone can launch EC2 instances from this image)"
    Remediation: "Modify AMI permissions to private or specific accounts only"
    Keywords:
      - "AMI public"
      - "modify-image-attribute"
      - "launchPermission all"
      - "public AMI"
      - "shared image"
    ML_Label: "misconfiguration"

Resources:

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "AMI-VPC"
        - Key: Misconfiguration
          Value: "AMI-001"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-1"

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "AMI-Public-Subnet"
        - Key: Misconfiguration
          Value: "AMI-001"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-1"

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for AMI source instance"
      VpcId: !Ref VPC

      # MISCONFIGURATION: SSH open to world (secondary issue but realistic)
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"

      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"

      Tags:
        - Key: Name
          Value: "AMI-SG"
        - Key: Misconfiguration
          Value: "AMI-001"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-1"

  SourceEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro

      # Region-compatible AMI mapping
      ImageId: !FindInMap [AWSRegionArch2AMI, !Ref "AWS::Region", AMI]

      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup

      # Removed KeyName dependency to avoid deployment failure

      Tags:
        - Key: Name
          Value: "AMI-Source-Instance"
        - Key: Misconfiguration
          Value: "AMI-001"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "CRITICAL"
        - Key: Batch
          Value: "Batch-1"

Mappings:
  AWSRegionArch2AMI:
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    us-west-2:
      AMI: ami-0d70546e43a328d54
    eu-west-1:
      AMI: ami-07470b0ad10cbe60e

Outputs:
  InstanceId:
    Description: "EC2 instance ID (used to create AMI)"
    Value: !Ref SourceEC2Instance

  CreateAmiCommand:
    Description: "Command to create AMI"
    Value: !Sub "aws ec2 create-image --instance-id ${SourceEC2Instance} --name Public-Misconfig-AMI --description 'AMI to be shared publicly'"

  MakePublicCommand:
    Description: "Command to make AMI public (MISCONFIGURATION)"
    Value: "aws ec2 modify-image-attribute --image-id <AMI_ID> --launch-permission Add=[{Group=all}]"

  Risk:
    Description: "Security Risk"
    Value: "Public AMI allows any AWS account to launch instances containing sensitive data, credentials, or configurations."

  FixCommand:
    Description: "Remediation Command"
    Value: |
      aws ec2 modify-image-attribute \
        --image-id <AMI_ID> \
        --launch-permission Remove=[{Group=all}]
