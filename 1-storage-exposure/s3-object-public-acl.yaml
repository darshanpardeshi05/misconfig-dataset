AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - Individual S3 object with public read ACL

# METADATA - For research tracking and automated detection
Metadata:
  Misconfiguration:
    Category: "Storage-Exposure"
    Severity: "HIGH"
    RuleId: "S3-005"
    Description: "Individual S3 object has public read ACL even though bucket is private"
    Remediation: "Remove public-read ACL from object"
    Keywords:
      - "s3 object acl public"
      - "public-read object"
      - "PutObjectAcl"
      - "object level exposure"
      - "s3 object public"
    ML_Label: "misconfiguration"

Resources:

  PrivateBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "s3-object-public-${AWS::AccountId}-${AWS::StackName}"

      # Bucket is secure (important for this scenario)
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: true
        IgnorePublicAcls: false
        RestrictPublicBuckets: true

      Tags:
        - Key: Name
          Value: "S3-Private-Bucket"
        - Key: Misconfiguration
          Value: "S3-005"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-1"

  UploadFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Create':
                      s3 = boto3.client('s3')
                      bucket = event['ResourceProperties']['BucketName']
                      key = event['ResourceProperties']['ObjectKey']

                      s3.put_object(
                          Bucket=bucket,
                          Key=key,
                          Body=b"Sensitive data"
                      )

                      # MISCONFIGURATION: Make object public
                      s3.put_object_acl(
                          Bucket=bucket,
                          Key=key,
                          ACL='public-read'
                      )

                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  else:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

      Policies:
        - PolicyName: S3ObjectPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub "arn:aws:s3:::${PrivateBucket}/*"

  CustomUpload:
    Type: Custom::UploadObject
    Properties:
      ServiceToken: !GetAtt UploadFunction.Arn
      BucketName: !Ref PrivateBucket
      ObjectKey: "sensitive.txt"

Outputs:
  BucketName:
    Value: !Ref PrivateBucket

  PublicObjectURL:
    Value: !Sub "https://${PrivateBucket}.s3.${AWS::Region}.amazonaws.com/sensitive.txt"

  Risk:
    Value: "Object is publicly accessible even though bucket appears secure."

  FixCommand:
    Value: !Sub "aws s3api put-object-acl --bucket ${PrivateBucket} --key sensitive.txt --acl private"
