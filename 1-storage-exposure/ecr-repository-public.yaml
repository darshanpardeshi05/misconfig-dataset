AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - ECR repository with public pull access

# METADATA - For research tracking and automated detection
Metadata:
  Misconfiguration:
    Category: "Storage-Exposure"
    Severity: "HIGH"
    RuleId: "ECR-001"
    Description: "ECR repository allows public pull access (anyone can pull images without authentication)"
    Remediation: "Restrict repository policy to specific IAM principals and enable image scanning"
    Keywords:
      - "ECR public"
      - "Principal *"
      - "public repository"
      - "docker pull public"
      - "ScanOnPush false"
    ML_Label: "misconfiguration"

Resources:

  PublicECRRepository:
    Type: AWS::ECR::Repository
    Properties:

      # Unique repository name
      RepositoryName: !Sub "public-repo-${AWS::AccountId}-${AWS::StackName}"

      # MISCONFIGURATION: Public pull access allowed
      RepositoryPolicyText:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal: "*"
            Action:
              - "ecr:GetDownloadUrlForLayer"
              - "ecr:BatchGetImage"
              - "ecr:BatchCheckLayerAvailability"

      # MISCONFIGURATION: Image scanning disabled
      ImageScanningConfiguration:
        ScanOnPush: false

      # Weak encryption configuration (not critical but included)
      EncryptionConfiguration:
        EncryptionType: "AES256"

      # Tags used for filtering, classification, and mapping
      Tags:
        - Key: Name
          Value: "ECR-Public-Repository"
        - Key: Misconfiguration
          Value: "ECR-001"
        - Key: Category
          Value: "Storage-Exposure"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-1"

Outputs:
  RepositoryUri:
    Description: "ECR repository URI"
    Value: !GetAtt PublicECRRepository.RepositoryUri

  PublicPullCommand:
    Description: "Command to pull image (after pushing one)"
    Value: !Sub "docker pull ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${PublicECRRepository}:latest"

  Risk:
    Description: "Security Risk"
    Value: "Public repository allows anyone to download container images, exposing sensitive application code."

  FixCommand:
    Description: "Remediation Command"
    Value: |
      aws ecr set-repository-policy \
        --repository-name <REPO_NAME> \
        --policy-text '{}'
