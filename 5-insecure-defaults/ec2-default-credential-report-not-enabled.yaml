AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - IAM credential report not generated regularly (no visibility into user credentials)

Metadata:
  Misconfiguration:
    Category: "Insecure Defaults"
    Severity: "LOW"
    RuleId: "IAM-014"
    Description: "IAM credential reports are not generated on a regular schedule. Without regular credential reports, you cannot audit user access keys, MFA status, password ages, or last activity."
    Remediation: "Schedule automated IAM credential report generation using EventBridge and Lambda"
    # KEYWORDS FOR KEYWORD-BASED DETECTION
    Keywords:
      - "credential report"
      - "get-credential-report"
      - "generate-credential-report"
      - "IAM reporting"
    # LABEL FOR ML-BASED DETECTION
    ML_Label: "misconfiguration"

Resources:
  # MISCONFIGURATION: No automated credential report generation
  
  # This template documents the absence of credential report automation
  # In a secure environment, you would have:
  # 1. Scheduled EventBridge rule
  # 2. Lambda to generate report
  # 3. S3 bucket to store reports
  # 4. SNS topic for alerts
  
  # Since CloudFormation cannot directly enforce credential report scheduling,
  # this template demonstrates the lack of automation with example resources
  # that SHOULD exist but DON'T
  
  DocumentationOnly:
    Type: AWS::CloudFormation::WaitConditionHandle
    Metadata:
      CredentialReportMisconfiguration: |
        
        ============================================================
        MISCONFIGURATION: IAM Credential Report Not Generated
        ============================================================
        
        WHAT IS CREDENTIAL REPORT:
        - CSV/JSON report of all IAM users in your account
        - Contains: password age, MFA status, access keys, last activity
        - Manual generation available via AWS Console or CLI
        
        WHY THIS IS A PROBLEM:
        - No automated visibility into credential health
        - Cannot detect users with old access keys (>90 days)
        - Cannot identify users without MFA
        - Cannot track password rotation compliance
        - No historical record for audits
        
        WHAT YOU ARE MISSING:
        - User: password_last_changed, mfa_active
        - Access keys: key_last_rotated, key_active
        - Last activity: password_last_used, access_key_last_used
        - Console login status: user_creation_time
        
        ============================================================
        DETECTION AND REMEDIATION
        ============================================================
        
        DETECTION COMMAND:
        aws iam generate-credential-report && aws iam get-credential-report
        
        TO CHECK LAST REPORT GENERATION:
        aws iam get-credential-report --query 'GeneratedTime'
        
        REMEDIATION (AUTOMATED SCHEDULE):
        1. Create Lambda to generate report weekly
        2. Create EventBridge rule for weekly trigger
        3. Store reports in S3 with versioning
        4. Set up alerts for anomalies

  # Example of what SHOULD be configured (commented - missing automation)
  # This represents the automation that is NOT present
  
  # MissingEventBridgeRule:
  #   Type: AWS::Events::Rule
  #   Properties:
  #     Name: "weekly-credential-report"
  #     ScheduleExpression: "cron(0 0 ? * MON *)"
  #     Targets:
  #       - Arn: !GetAtt MissingLambda.Arn
  #         Id: "LambdaTarget"
  #
  # MissingLambda:
  #   Type: AWS::Lambda::Function
  #   Properties:
  #     Handler: "index.handler"
  #     Runtime: "python3.9"
  #     Role: !GetAtt MissingLambdaRole.Arn
  #     Code:
  #       ZipFile: |
  #         import boto3
  #         import datetime
  #         
  #         def handler(event, context):
  #             iam = boto3.client('iam')
  #             s3 = boto3.client('s3')
  #             
  #             # Generate credential report
  #             iam.generate_credential_report()
  #             time.sleep(30)
  #             report = iam.get_credential_report()
  #             
  #             # Store in S3
  #             date_str = datetime.datetime.now().strftime('%Y-%m-%d')
  #             s3.put_object(
  #                 Bucket='credential-reports-bucket',
  #                 Key=f'reports/credential-report-{date_str}.csv',
  #                 Body=report['Content']
  #             )
  #             return {'statusCode': 200}
  #
  # MissingS3Bucket:
  #   Type: AWS::S3::Bucket
  #   Properties:
  #     BucketName: !Sub "credential-reports-${AWS::AccountId}"

Outputs:
  RiskDescription:
    Description: "Why missing credential report is a problem"
    Value: |
      Without regular credential reports:
      
      - Cannot detect users with old access keys (>90 days)
      - Cannot identify users without MFA
      - Cannot track password rotation compliance
      - No historical audit records
      - Security audits become manual and error-prone
      - Orphaned accounts go undetected
      
      AWS recommends generating credential reports weekly for audit compliance.
  DetectionCommand:
    Description: "Command to check if credential report exists"
    Value: "aws iam generate-credential-report && aws iam get-credential-report"
  RemediationSteps:
    Description: "How to automate credential reports"
    Value: |
      1. Create Lambda function to generate credential report
      2. Create EventBridge rule (weekly schedule)
      3. Create S3 bucket to store reports
      4. Add SNS topic for failure alerts
      5. Set up CloudWatch dashboard for key metrics
  WhatYouAreMissing:
    Description: "Information not being captured"
    Value: |
      - User creation timestamps
      - Password last changed dates
      - MFA enable/disable history  
      - Access key rotations
      - Last login timestamps
      - Inactive user detection
  ComplianceViolation:
    Description: "Compliance frameworks requiring credential monitoring"
    Value: "PCI DSS (Requirement 8.2.4 - monitor password changes), NIST 800-53 (AU-2 - audit events), SOC 2 (CC6.1 - logical access)"
