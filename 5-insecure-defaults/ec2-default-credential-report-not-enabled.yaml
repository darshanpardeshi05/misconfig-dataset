AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - IAM credential report not generated regularly (no scheduled audit of credentials)

Metadata:
  Misconfiguration:
    Category: "Insecure Defaults"
    Severity: "LOW"
    RuleId: "IAM-014"
    Description: "IAM credential reports are not generated on a regular schedule. Without regular credential reports, you cannot audit user access keys, MFA status, password ages, or last activity."
    Remediation: "Schedule automated IAM credential report generation using EventBridge and Lambda"
    Keywords:
      - "credential report"
      - "get-credential-report"
      - "generate-credential-report"
      - "IAM reporting"
      - "AWS::IAM::User"
    ML_Label: "misconfiguration"

Resources:
  # This template documents the ABSENCE of credential report automation.
  # No EventBridge rule, no Lambda function, no S3 bucket for reports.
  # The misconfiguration is that nothing is set up to generate reports.
  DocumentationPlaceholder:
    Type: AWS::CloudFormation::WaitConditionHandle
    Metadata:
      Note: "No automated credential report generation is configured."

Outputs:
  Risk:
    Description: "Security Risk"
    Value: "Without regular credential reports, you cannot detect stale passwords, non‑rotated access keys, or inactive users. Compliance audits become manual and error‑prone."
  RemediationCommand:
    Description: "Fix: Automate credential report generation using EventBridge and Lambda"
    Value: |
      # Example: Create a Lambda function and schedule it weekly.
      # Lambda should call iam.generate_credential_report(), wait, then store report in S3.
      aws events put-rule --name weekly-credential-report --schedule-expression "cron(0 0 ? * MON *)"
      aws lambda create-function --function-name generate-credential-report --runtime python3.9 --role <ROLE_ARN> --zip-file fileb://function.zip
      aws events put-targets --rule weekly-credential-report --targets "Id"="1","Arn"="<LAMBDA_ARN>"
