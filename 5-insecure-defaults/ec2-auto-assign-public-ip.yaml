AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - EC2 instance in public subnet with auto-assign public IP enabled

Metadata:
  Misconfiguration:
    Category: "Insecure Defaults"
    Severity: "MEDIUM"
    RuleId: "EC2-001"
    Description: "EC2 instance is launched in a public subnet with auto-assign public IP enabled. This gives the instance a public IP address, increasing attack surface unnecessarily."
    Remediation: "Use private subnets for workloads that don't need direct internet access. If public IP is required, restrict security groups to specific IPs."
    Keywords:
      - "MapPublicIpOnLaunch: true"
      - "AssociatePublicIpAddress: true"
      - "PublicIp"
      - "auto-assign"
    ML_Label: "misconfiguration"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.16.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "Public-IP-Misconfig-VPC"
        - Key: Batch
          Value: "Batch-8"

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.16.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "Public-Subnet-Auto-IP"
        - Key: Misconfiguration
          Value: "EC2-001"
        - Key: Category
          Value: "Insecure-Defaults"
        - Key: Severity
          Value: "MEDIUM"
        - Key: Batch
          Value: "Batch-8"

  PublicAccessSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group with open SSH for demonstration"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: "Public-SG-With-SSH"
        - Key: Batch
          Value: "Batch-8"

  EC2WithPublicIP:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !FindInMap [AWSRegionArch2AMI, !Ref "AWS::Region", AMI]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref PublicAccessSecurityGroup
      Tags:
        - Key: Name
          Value: "Instance-With-Public-IP"
        - Key: Misconfiguration
          Value: "EC2-001"
        - Key: Category
          Value: "Insecure-Defaults"
        - Key: Severity
          Value: "MEDIUM"
        - Key: Batch
          Value: "Batch-8"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Tags:
      - Key: Name
        Value: "Public-IP-IGW"
      - Key: Batch
        Value: "Batch-8"

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: "Public-RT"
        - Key: Batch
          Value: "Batch-8"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

Mappings:
  AWSRegionArch2AMI:
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    us-west-2:
      AMI: ami-0d70546e43a328d54
    eu-west-1:
      AMI: ami-07470b0ad10cbe60e

Outputs:
  InstanceId:
    Description: "EC2 instance with public IP (misconfiguration)"
    Value: !Ref EC2WithPublicIP
  PublicIpAddress:
    Description: "Public IP address assigned to instance"
    Value: !GetAtt EC2WithPublicIP.PublicIp
  Risk:
    Description: "Security Risk"
    Value: "Instance has a public IP and open SSH (0.0.0.0/0). Directly reachable from internet – brute force and attack risk."
  RemediationCommand:
    Description: "Fix: Stop instance, modify network interface to remove public IP, or move to private subnet"
    Value: |
      aws ec2 stop-instances --instance-ids <INSTANCE_ID>
      aws ec2 modify-network-interface-attribute --network-interface-id <ENI_ID> --no-associate-public-ip-address
      aws ec2 start-instances --instance-ids <INSTANCE_ID>
