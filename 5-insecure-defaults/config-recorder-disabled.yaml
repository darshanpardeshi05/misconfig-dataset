AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - AWS Config recorder disabled (no configuration tracking or compliance monitoring)

Metadata:
  Misconfiguration:
    Category: "Insecure Defaults"
    Severity: "HIGH"
    RuleId: "CONFIG-001"
    Description: "AWS Config recorder is disabled. No configuration history, change tracking, or compliance monitoring for AWS resources."
    Remediation: "Enable AWS Config recorder in all regions with appropriate rules and S3 bucket delivery"
    Keywords:
      - "ConfigurationRecorder"
      - "RecordingGroup"
      - "ConfigRecorder"
      - "DeliveryChannel"
    ML_Label: "misconfiguration"

Resources:
  # This template documents the ABSENCE of AWS Config recorder.
  # No ConfigurationRecorder or DeliveryChannel is defined.
  DocumentationPlaceholder:
    Type: AWS::CloudFormation::WaitConditionHandle
    Metadata:
      Note: "No AWS Config recorder is defined – configuration tracking is disabled."

Outputs:
  Risk:
    Description: "Security Risk"
    Value: "Without Config recorder, resource changes are not logged, compliance rules are not evaluated, and security investigations lack historical context."
  RemediationCommand:
    Description: "Fix: Enable AWS Config recorder, create delivery channel to S3"
    Value: |
      # Create S3 bucket for Config
      aws s3api create-bucket --bucket aws-config-bucket-<ACCOUNT_ID> --create-bucket-configuration LocationConstraint=<REGION>
      # Create IAM role for Config (trust policy allowing config.amazonaws.com)
      aws iam create-role --role-name AWSConfigRole --assume-role-policy-document file://trust-policy.json
      # Create configuration recorder
      aws configservice put-configuration-recorder --configuration-recorder name=default,roleARN=arn:aws:iam::<ACCOUNT_ID>:role/AWSConfigRole --recording-group allSupported=true,includeGlobalResourceTypes=true
      # Create delivery channel
      aws configservice put-delivery-channel --delivery-channel name=default,s3BucketName=aws-config-bucket-<ACCOUNT_ID>
      # Start recorder
      aws configservice start-configuration-recorder --configuration-recorder-name default
