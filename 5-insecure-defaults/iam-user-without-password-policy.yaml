AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - IAM user without password policy (no expiration or complexity)

Metadata:
  Misconfiguration:
    Category: "Insecure Defaults"
    Severity: "MEDIUM"
    RuleId: "IAM-015"
    Description: "IAM users have passwords but no account‑wide password policy is enforced. Passwords never expire, there are no complexity requirements, and passwords can be reused indefinitely."
    Remediation: "Enable AWS account password policy with minimum length, complexity, and expiration (e.g., 90 days)."
    Keywords:
      - "PasswordPolicy"
      - "MinimumPasswordLength"
      - "RequireUppercaseCharacters"
      - "RequireLowercaseCharacters"
      - "RequireNumbers"
      - "RequireSymbols"
      - "MaxPasswordAge"
    ML_Label: "misconfiguration"

Resources:
  # This template documents the ABSENCE of an account password policy.
  # No AWS::IAM::AccountPasswordPolicy resource is defined.
  # The misconfiguration is that no policy is enforced.
  DocumentationPlaceholder:
    Type: AWS::CloudFormation::WaitConditionHandle
    Metadata:
      Note: "No account password policy is configured – passwords have no expiration or complexity rules."

  # Example IAM user with a weak password (policy missing allows this)
  UserWithWeakPassword:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub "weak-password-user-${AWS::StackName}"
      LoginProfile:
        Password: "password123"
        PasswordResetRequired: false
      Tags:
        - Key: Name
          Value: "Weak-Password-User"
        - Key: Misconfiguration
          Value: "IAM-015"
        - Key: Category
          Value: "Insecure-Defaults"
        - Key: Severity
          Value: "MEDIUM"
        - Key: Batch
          Value: "Batch-8"

Outputs:
  Risk:
    Description: "Security Risk"
    Value: "Without a password policy, passwords never expire, there is no minimum length or complexity, and users can reuse old passwords. This weakens account security and increases the risk of credential stuffing or brute force attacks."
  RemediationCommand:
    Description: "Fix: Enable account password policy with strong settings"
    Value: |
      aws iam update-account-password-policy \
        --minimum-password-length 14 \
        --require-symbols \
        --require-numbers \
        --require-uppercase-characters \
        --require-lowercase-characters \
        --allow-users-to-change-password \
        --max-password-age 90 \
        --password-reuse-prevention 24 \
        --hard-expiry
