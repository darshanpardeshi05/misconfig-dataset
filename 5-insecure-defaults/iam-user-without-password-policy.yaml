AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - IAM user without password policy (no expiration, complexity, or rotation requirements)

Metadata:
  Misconfiguration:
    Category: "Insecure Defaults"
    Severity: "MEDIUM"
    RuleId: "IAM-015"
    Description: "IAM user has a password but no account-wide password policy is enforced. Passwords never expire, no complexity requirements, no minimum length."
    Remediation: "Enable AWS account password policy with minimum length, complexity, and expiration requirements"
    # KEYWORDS FOR KEYWORD-BASED DETECTION
    Keywords:
      - "PasswordPolicy"
      - "MinimumPasswordLength"
      - "RequireUppercaseCharacters"
      - "RequireLowercaseCharacters"
      - "RequireNumbers"
      - "RequireSymbols"
      - "MaxPasswordAge"
    # LABEL FOR ML-BASED DETECTION
    ML_Label: "misconfiguration"

Resources:
  # MISCONFIGURATION START: IAM user with password but no password policy
  
  # Note: Password policy is an account-level setting, not per-user
  # This template documents the ABSENCE of password policy
  # and shows IAM users with passwords that have NO restrictions
  
  DocumentationOnly:
    Type: AWS::CloudFormation::WaitConditionHandle
    Metadata:
      PasswordPolicyMisconfiguration: |
        
        ============================================================
        MISCONFIGURATION: IAM User Without Password Policy
        ============================================================
        
        WHAT IS PASSWORD POLICY:
        - Account-wide settings for IAM user passwords
        - Enforces: minimum length, character types, expiration
        - Prevents password reuse
        - Requires regular rotation
        
        WHY THIS IS A PROBLEM:
        - Passwords NEVER expire (same password for years)
        - No minimum length (weak "1234" or "password")
        - No complexity requirements ("password", "admin")
        - No reuse prevention (same password cycled)
        - Users can set very weak passwords
        - Compromised passwords remain valid indefinitely
        
        WHAT YOU ARE MISSING:
        - Password expiration (e.g., every 90 days)
        - Minimum password length (e.g., 14 characters)
        - Require uppercase letters (A-Z)
        - Require lowercase letters (a-z)
        - Require numbers (0-9)
        - Require symbols (!@#$%^&*)
        - Password reuse prevention (last 24 passwords)
        - Password change required at next login

  # MISCONFIGURATION: IAM user with weak password (no policy enforced)
  UserWithWeakPassword:
    Type: AWS::IAM::User
    Properties:
      UserName: "user-with-weak-password"
      # MISCONFIGURATION: Password is weak but no policy to prevent it
      LoginProfile:
        Password: "password123"
        PasswordResetRequired: false
      Tags:
        - Key: Misconfiguration
          Value: "IAM-User-Weak-Password"
        - Key: PasswordCompliance
          Value: "None"

  # MISCONFIGURATION: IAM user with very simple password
  UserWithSimplePassword:
    Type: AWS::IAM::User
    Properties:
      UserName: "user-with-simple-password"
      LoginProfile:
        Password: "admin"
        PasswordResetRequired: false
      Tags:
        - Key: Misconfiguration
          Value: "IAM-User-Simple-Password"

  # MISCONFIGURATION: IAM user with no password expiration (never forced to change)
  UserWithNoExpiration:
    Type: AWS::IAM::User
    Properties:
      UserName: "user-no-expiration"
      LoginProfile:
        Password: "ComplexPass123!"
        PasswordResetRequired: false
      Tags:
        - Key: Misconfiguration
          Value: "IAM-User-No-Password-Expiration"
        - Key: PasswordAge
          Value: "Never rotated"

  # MISCONFIGURATION: IAM user with password that never expires
  UserWithPermanentPassword:
    Type: AWS::IAM::User
    Properties:
      UserName: "user-permanent-password"
      LoginProfile:
        Password: "PermanentPass456!"
        PasswordResetRequired: false
      Tags:
        - Key: Misconfiguration
          Value: "IAM-User-Permanent-Password"

  # Example of CORRECT password policy (commented - what SHOULD exist but DOESN'T)
  # CorrectPasswordPolicy:
  #   Type: AWS::IAM::AccountPasswordPolicy
  #   Properties:
  #     MinimumPasswordLength: 14
  #     RequireUppercaseCharacters: true
  #     RequireLowercaseCharacters: true
  #     RequireNumbers: true
  #     RequireSymbols: true
  #     MaxPasswordAge: 90
  #     PasswordReusePrevention: 24
  #     HardExpiry: true

Outputs:
  UserWithWeakPassword:
    Description: "IAM user with weak password (no policy enforced)"
    Value: !Ref UserWithWeakPassword
  UserWithSimplePassword:
    Description: "IAM user with simple 'admin' password"
    Value: !Ref UserWithSimplePassword
  RiskDescription:
    Description: "Why no password policy is dangerous"
    Value: |
      Without password policy:
      
      - Passwords NEVER expire (same password for years)
      - Users can set "password123" or "admin" as password
      - No minimum length (can be 1 character)
      - No complexity requirements
      - Compromised passwords remain valid indefinitely
      - Credential stuffing attacks succeed easily
      - Compliance violations (PCI DSS, NIST)
      
      With proper password policy:
      - Passwords expire every 90 days
      - Minimum 14 characters required
      - Must include uppercase, lowercase, numbers, symbols
      - Cannot reuse last 24 passwords
      - New users must change password at first login
  AttackScenario:
    Description: "How attacker exploits weak password policy"
    Value: |
      Scenario 1 - Credential Stuffing:
      1. Attacker obtains leaked credentials from other websites
      2. Attacker tries same password on AWS Console
      3. User has weak password "password123"
      4. Attacker gains access to AWS account
      
      Scenario 2 - Brute Force:
      1. Attacker knows username (often email)
      2. No password policy means short, simple passwords allowed
      3. Attacker tries common passwords: admin, password, 123456
      4. User's password "admin" works
      5. Attacker accesses sensitive resources
      
      Scenario 3 - Stale Credentials:
      1. Employee leaves company 2 years ago
      2. Password never expires (no max age policy)
      3. Former employee still knows password
      4. Accesses AWS account after leaving
      5. Data theft goes undetected
  RemediationCommand:
    Description: "Fix: Enable account password policy"
    Value: |
      # Enable password policy with strong requirements
      aws iam update-account-password-policy \
        --minimum-password-length 14 \
        --require-symbols \
        --require-numbers \
        --require-uppercase-characters \
        --require-lowercase-characters \
        --allow-users-to-change-password \
        --max-password-age 90 \
        --password-reuse-prevention 24 \
        --hard-expiry
      
      # Verify password policy
      aws iam get-account-password-policy
      
      # Force all users to change password at next login
      for user in $(aws iam list-users --query 'Users[].UserName' --output text); do
        if aws iam get-login-profile --user-name $user 2>/dev/null; then
          aws iam update-login-profile --user-name $user --password-reset-required
        fi
      done
  CheckPasswordPolicyCommand:
    Description: "Command to check if password policy is enabled"
    Value: "aws iam get-account-password-policy"
  ComplianceViolation:
    Description: "Compliance frameworks requiring password policy"
    Value: "PCI DSS (Requirement 8.2.4 - password parameters), NIST 800-63B (memorized secrets), ISO 27001 (A.9.4.3 - password management), SOC 2 (CC6.1 - access controls)"
  WhatStrongPasswordPolicyIncludes:
    Description: "Recommended password policy settings"
    Value: |
      - MinimumPasswordLength: 14
      - RequireUppercaseCharacters: true
      - RequireLowercaseCharacters: true
      - RequireNumbers: true
      - RequireSymbols: true
      - MaxPasswordAge: 90 days
      - PasswordReusePrevention: 24
      - HardExpiry: true
