AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - Default security group with open inbound rules (SSH from 0.0.0.0/0) in use

Metadata:
  Misconfiguration:
    Category: "Insecure Defaults"
    Severity: "HIGH"
    RuleId: "EC2-002"
    Description: "Default security group is modified to allow SSH from 0.0.0.0/0, and an EC2 instance is launched using it. This exposes the instance to internet SSH attacks and bypasses network segmentation best practices."
    Remediation: "Create and use custom security groups with least-privilege rules. Do not modify or rely on default security groups for workloads."
    Keywords:
      - "default security group"
      - "0.0.0.0/0"
      - "SecurityGroupIngress"
      - "SSH"
      - "port 22"
    ML_Label: "misconfiguration"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.17.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "Default-SG-Misconfig-VPC"
        - Key: Batch
          Value: "Batch-8"

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.17.0/24"
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "Default-SG-Public-Subnet"
        - Key: Batch
          Value: "Batch-8"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Tags:
      - Key: Name
        Value: "Default-SG-IGW"
      - Key: Batch
        Value: "Batch-8"

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: "Default-SG-RT"
        - Key: Batch
          Value: "Batch-8"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  # MISCONFIGURATION: Add open SSH rule to the default security group of the VPC
  OpenSSHInDefaultSG:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt VPC.DefaultSecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: "0.0.0.0/0"

  # MISCONFIGURATION: EC2 instance using the default security group
  DefaultSGInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !FindInMap [AWSRegionArch2AMI, !Ref "AWS::Region", AMI]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !GetAtt VPC.DefaultSecurityGroup
      Tags:
        - Key: Name
          Value: "Instance-Using-Default-SG"
        - Key: Misconfiguration
          Value: "EC2-002"
        - Key: Category
          Value: "Insecure-Defaults"
        - Key: Severity
          Value: "HIGH"
        - Key: Batch
          Value: "Batch-8"

Mappings:
  AWSRegionArch2AMI:
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    us-west-2:
      AMI: ami-0d70546e43a328d54
    eu-west-1:
      AMI: ami-07470b0ad10cbe60e

Outputs:
  InstanceId:
    Description: "EC2 instance using default security group"
    Value: !Ref DefaultSGInstance
  DefaultSecurityGroupId:
    Description: "ID of the VPC's default security group (now open to SSH from anywhere)"
    Value: !GetAtt VPC.DefaultSecurityGroup
  Risk:
    Description: "Security Risk"
    Value: "Default security group has an open SSH rule (0.0.0.0/0). Any instance using it is exposed to internet SSH brute force attacks. Default security group is shared across resources, increasing blast radius."
  RemediationCommand:
    Description: "Fix: Remove the open SSH rule from default SG, stop using default SG, create custom least‑privilege SGs."
    Value: !Sub "aws ec2 revoke-security-group-ingress --group-id ${VPC.DefaultSecurityGroup} --protocol tcp --port 22 --cidr 0.0.0.0/0"
