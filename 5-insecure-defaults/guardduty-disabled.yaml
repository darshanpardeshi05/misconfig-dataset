AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - Amazon GuardDuty disabled (no threat detection)

Metadata:
  Misconfiguration:
    Category: "Insecure Defaults"
    Severity: "HIGH"
    RuleId: "GUARDDUTY-001"
    Description: "Amazon GuardDuty is disabled. No intelligent threat detection, anomaly monitoring, or finding generation for your AWS account."
    Remediation: "Enable GuardDuty in all regions with S3 and SNS publishing for findings"
    Keywords:
      - "GuardDuty"
      - "Detector"
      - "FindingPublishingFrequency"
      - "EnableGuardDuty"
    ML_Label: "misconfiguration"

Resources:
  # This template documents the ABSENCE of a GuardDuty detector.
  # No GuardDuty Detector resource is defined.
  DocumentationPlaceholder:
    Type: AWS::CloudFormation::WaitConditionHandle
    Metadata:
      Note: "No GuardDuty detector is enabled – threat detection is disabled."

Outputs:
  Risk:
    Description: "Security Risk"
    Value: "With GuardDuty disabled, compromised EC2 instances, crypto mining, unusual API calls (reconnaissance), and data exfiltration go undetected. Compliance frameworks (CIS, PCI) require GuardDuty or equivalent detection."
  RemediationCommand:
    Description: "Fix: Enable GuardDuty in current region (and all regions)"
    Value: |
      # Enable in current region
      aws guardduty create-detector --enable --finding-publishing-frequency FIFTEEN_MINUTES
      # (Optional) Enable in all regions
      for region in $(aws ec2 describe-regions --query 'Regions[].RegionName' --output text); do
        aws guardduty create-detector --enable --finding-publishing-frequency FIFTEEN_MINUTES --region $region
      done
