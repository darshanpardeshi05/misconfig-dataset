AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - AWS CloudTrail disabled (no audit logging of API activity)

Metadata:
  Misconfiguration:
    Category: "Insecure Defaults"
    Severity: "HIGH"
    RuleId: "CT-001"
    Description: "AWS CloudTrail is disabled. No API activity logs are captured, making it impossible to audit who did what, when, and from where in your AWS account."
    Remediation: "Enable CloudTrail in all regions with log file validation and encryption. Send logs to CloudWatch Logs and S3 bucket with appropriate permissions."
    Keywords:
      - "CloudTrail"
      - "Trail"
      - "IsMultiRegionTrail"
      - "EnableLogFileValidation"
      - "S3BucketName"
    ML_Label: "misconfiguration"

Resources:
  # This template documents the ABSENCE of any CloudTrail trail.
  # No trail resource is defined; CloudTrail remains disabled.
  # The misconfiguration is that nothing is configured for logging.
  DocumentationPlaceholder:
    Type: AWS::CloudFormation::WaitConditionHandle
    Metadata:
      Note: "No CloudTrail trail is defined – audit logging is disabled."

Outputs:
  Risk:
    Description: "Security Risk"
    Value: "With CloudTrail disabled, there is no record of API calls. Security incidents cannot be investigated, and compliance frameworks (PCI DSS, HIPAA, SOC 2) will fail."
  RemediationCommand:
    Description: "Fix: Enable multi-region CloudTrail with log file validation and S3 bucket"
    Value: |
      # Create S3 bucket for logs
      aws s3api create-bucket --bucket cloudtrail-logs-<ACCOUNT_ID> --create-bucket-configuration LocationConstraint=<REGION>
      # Enable versioning
      aws s3api put-bucket-versioning --bucket cloudtrail-logs-<ACCOUNT_ID> --versioning-configuration Status=Enabled
      # Create multi-region trail
      aws cloudtrail create-trail --name multi-region-cloudtrail --s3-bucket-name cloudtrail-logs-<ACCOUNT_ID> --is-multi-region-trail --enable-log-file-validation --include-global-service-events
      # Start logging
      aws cloudtrail start-logging --name multi-region-cloudtrail
