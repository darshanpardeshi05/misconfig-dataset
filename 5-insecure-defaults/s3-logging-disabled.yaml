AWSTemplateFormatVersion: '2010-09-09'
Description: MISCONFIGURATION - S3 bucket access logging disabled

Metadata:
  Misconfiguration:
    Category: "Insecure Defaults"
    Severity: "MEDIUM"
    RuleId: "S3-008"
    Description: "S3 bucket does not have access logging enabled. No logs are captured for who accessed which objects, when, and from where."
    Remediation: "Enable S3 server access logging to a dedicated logging bucket with proper permissions."
    Keywords:
      - "LoggingConfiguration"
      - "TargetBucket"
      - "TargetPrefix"
      - "Server access logging"
    ML_Label: "misconfiguration"

Resources:
  UnloggedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "unlogged-bucket-${AWS::AccountId}-${AWS::StackName}"
      # MISCONFIGURATION: No LoggingConfiguration property.
      # Access logging is disabled by default.
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: "Unlogged-S3-Bucket"
        - Key: Misconfiguration
          Value: "S3-008"
        - Key: Category
          Value: "Insecure-Defaults"
        - Key: Severity
          Value: "MEDIUM"
        - Key: Batch
          Value: "Batch-8"

Outputs:
  BucketName:
    Description: "S3 bucket with logging disabled"
    Value: !Ref UnloggedBucket
  Risk:
    Description: "Security Risk"
    Value: "No access logs means no audit trail for object requests. Cannot detect unauthorized access, data exfiltration, or troubleshoot access pattern issues."
  RemediationCommand:
    Description: "Fix: Enable server access logging to a dedicated logging bucket"
    Value: |
      # Create dedicated logging bucket
      aws s3api create-bucket --bucket logging-bucket-<ACCOUNT_ID> --create-bucket-configuration LocationConstraint=<REGION>
      # Grant LogDelivery group write permission
      aws s3api put-bucket-acl --bucket logging-bucket-<ACCOUNT_ID> --grant-write URI=http://acs.amazonaws.com/groups/s3/LogDelivery
      # Enable logging on source bucket
      aws s3api put-bucket-logging --bucket <SOURCE_BUCKET> --bucket-logging-status '{"LoggingEnabled":{"TargetBucket":"logging-bucket-<ACCOUNT_ID>","TargetPrefix":"access-logs/"}}'
